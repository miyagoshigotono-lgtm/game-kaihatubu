<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ===SECTION:CONFIG===
// 定数・Canvas初期化・グリッド設定・画面リサイズ。ゲーム全体で共有する土台。
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;       // 横マス数
const ROWS = 14;       // 縦マス数
const HUD = 70;        // 画面下部の情報表示エリアの高さ(px)
let TILE = 32;         // 1マスのピクセルサイズ（resizeで決定）
let monsterId = 0;     // 魔物の通し番号

const COLORS = {
  ground:   '#15101f',
  wall:     '#2a1f3d',
  wallEdge: '#3c2c57',
  player:   '#c879ff',
  prey:     '#5bd6a0',
  predator: '#ff6b6b',
  hero:     '#ffd23f',
  hud:      '#181222'
};

function resize() {
  const ratio = window.devicePixelRatio || 1;
  const availW = Math.min(window.innerWidth, 1200);
  const availH = window.innerHeight - HUD - 4;
  TILE = Math.max(14, Math.floor(Math.min(availW / COLS, availH / ROWS)));
  canvas.width = COLS * TILE * ratio;
  canvas.height = (ROWS * TILE + HUD) * ratio;
  canvas.style.width = (COLS * TILE) + 'px';
  canvas.style.height = (ROWS * TILE + HUD) + 'px';
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}
// ===END:CONFIG===

// ===SECTION:STATE===
const game = {
  stage: 1,
  round: 1,
  phase: 'dig',
  digsLeft: 15,
  
  // 永続的な成長要素（ラウンドをまたいで保持）
  meta: {
    totalExperience: 0, // 累計経験値
    evolutionPoints: 0, // 進化ポイント（魔物のステータス強化に使用）
    maxStageReached: 1, // 到達した最高ステージ
    digEfficiency: 1,   // 採掘効率（一度の行動で掘れる深さや確率補正）
    monsterSpawnRate: 1 // 魔物生成率のボーナス倍率
  },

  combo: 0,
  maxCombo: 0,
  
  player: { 
    x: Math.floor(COLS / 2), 
    y: 2 
  },
  
  map: [],
  monsters: [],
  heroes: [],
  particles: [],
  
  message: 'ステージ1開始：勇者が侵攻してくるぞ！',
  
  // 状態のリセット（ラウンド開始時に呼び出す）
  initRound() {
    this.round++;
    this.digsLeft = 15 + (this.stage * 5);
    this.combo = 0;
    this.monsters = [];
    this.heroes = [];
    this.particles = [];
    this.message = `ラウンド ${this.round} 開始。ダンジョンを拡張せよ！`;
  }
};

function inBounds(x, y) {
  return x >= 0 && x < COLS && y >= 0 && y < ROWS;
}

function isGround(x, y) {
  return inBounds(x, y) && game.map[x] && game.map[x][y] && !game.map[x][y].wall;
}

function isWall(x, y) {
  return inBounds(x, y) && game.map[x] && game.map[x][y] && game.map[x][y].wall;
}

function addParticle(x, y, color) {
  game.particles.push({
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,
    vx: (Math.random() - 0.5) * 100,
    vy: (Math.random() - 0.5) * 100,
    life: 1.0,
    decay: 0.05 + Math.random() * 0.05,
    color: color
  });
}

function resetCombo() {
  game.combo = 0;
}

function incrementCombo() {
  game.combo++;
  if (game.combo > game.maxCombo) {
    game.maxCombo = game.combo;
  }
  // コンボに応じてメタ的な報酬（経験値など）を蓄積
  game.meta.totalExperience += game.combo * 10;
}
// ===END:STATE===

// ===SECTION:ECOSYSTEM===
const SPECIES = {
  PREY_A: { id: 0, name: 'スライム', speed: 1, energyMax: 40, color: '#a8e063', hp: 5, repro: 60, size: 0.3, atk: 1 },
  PREY_B: { id: 1, name: 'ラビット', speed: 1.5, energyMax: 30, color: '#f5d3e0', hp: 3, repro: 40, size: 0.4, atk: 0.5 },
  PRED_A: { id: 2, name: 'スパイダー', speed: 0.8, energyMax: 60, color: '#8e44ad', hp: 12, repro: 90, size: 0.5, atk: 3 },
  PRED_B: { id: 3, name: 'ウルフ', speed: 1.2, energyMax: 80, color: '#d35400', hp: 20, repro: 120, size: 0.6, atk: 4 }
};

const HERO_CLASSES = {
  WARRIOR: { name: '戦士', hp: 30, atk: 5, speed: 1, color: '#e74c3c' },
  MAGE: { name: '魔法使い', hp: 15, atk: 8, speed: 0.5, color: '#3498db' }
};

if (typeof window.monsterId === 'undefined') window.monsterId = 0;

function createMonster(x, y, speciesId) {
  const s = Object.values(SPECIES)[speciesId];
  return { 
    id: ++window.monsterId, x, y, 
    speciesId, hp: s.hp, energy: s.energyMax * 0.7, 
    energyMax: s.energyMax, isPredator: speciesId >= 2,
    state: 'idle'
  };
}

function spawnMonster(x, y) {
  const speciesId = Math.random() < 0.6 ? (Math.random() < 0.5 ? 0 : 1) : (Math.random() < 0.5 ? 2 : 3);
  game.monsters.push(createMonster(x, y, speciesId));
}

function updateEcosystem() {
  for (let i = game.monsters.length - 1; i >= 0; i--) {
    const m = game.monsters[i];
    const s = Object.values(SPECIES)[m.speciesId];
    
    m.energy -= 1;
    if (m.energy < s.energyMax * 0.3) m.state = 'hungry';
    else if (m.energy > s.repro) m.state = 'reproducing';
    else m.state = 'idle';

    const opts = groundNeighbors(m.x, m.y);
    if (opts.length > 0 && Math.random() < (m.state === 'hungry' ? 0.9 : 0.4) * s.speed) {
      const p = opts[(Math.random() * opts.length) | 0]; 
      m.x = p[0]; m.y = p[1]; 
    }

    if (m.isPredator) {
      const prey = game.monsters.find(o => !o.isPredator && o.x === m.x && o.y === m.y);
      if (prey) { 
        prey.hp -= s.atk; 
        m.energy += 30; 
      }
    }

    const nh = nearestHero(m.x, m.y);
    if (nh.hero && nh.dist === 0) { nh.hero.hp -= s.atk; }

    if (m.state === 'reproducing' && opts.length > 0) {
      m.energy -= (s.repro / 2);
      const spawnPos = opts[(Math.random() * opts.length) | 0];
      game.monsters.push(createMonster(spawnPos[0], spawnPos[1], m.speciesId));
    }

    if (m.energy <= 0 || m.hp <= 0) game.monsters.splice(i, 1);
  }
}

function spawnHeroes(n) {
  for (let i = 0; i < n; i++) {
    const type = Math.random() < 0.7 ? HERO_CLASSES.WARRIOR : HERO_CLASSES.MAGE;
    game.heroes.push({ 
      x: 0, y: (ROWS / 2) | 0, 
      hp: type.hp + (game.stage * 5), 
      atk: type.atk, 
      class: type,
      moveTimer: 0 
    });
  }
}

function updateHeroes() {
  for (let i = game.heroes.length - 1; i >= 0; i--) {
    const h = game.heroes[i];
    h.moveTimer += h.class.speed;
    
    if (h.moveTimer >= 1) {
      h.moveTimer = 0;
      let target = null, bestD = Infinity;
      game.monsters.forEach(m => {
        const d = Math.abs(m.x - h.x) + Math.abs(m.y - h.y);
        if (d < bestD) { bestD = d; target = m; }
      });

      if (target) {
        if (bestD > 0) {
          const dx = Math.sign(target.x - h.x), dy = Math.sign(target.y - h.y);
          if (isGround(h.x + dx, h.y)) h.x += dx;
          else if (isGround(h.x, h.y + dy)) h.y += dy;
        } else {
          target.hp -= h.atk;
        }
      }
    }
    if (h.hp <= 0) game.heroes.splice(i, 1);
  }
}

function groundNeighbors(x, y) {
  return [[1,0],[-1,0],[0,1],[0,-1]].map(([dx, dy]) => [x+dx, y+dy]).filter(([nx, ny]) => isGround(nx, ny));
}

function nearestHero(x, y) {
  let best = null, bestD = Infinity;
  game.heroes.forEach(h => {
    const d = Math.abs(h.x - x) + Math.abs(h.y - y);
    if (d < bestD) { bestD = d; best = h; }
  });
  return { hero: best, dist: bestD };
}
// ===END:ECOSYSTEM===

// ===SECTION:INIT_INPUT===
function init() {
  if (!game.round) game.round = 1;
  game.phase = 'dig';
  game.digsLeft = 10 + (game.round - 1) * 3;
  game.filters = []; // 間接干渉：環境フィルター（例：移動速度低下、栄養素供給）

  const startX = Math.floor(COLS / 2);
  const startY = 2;
  game.player = { x: startX, y: startY };
  game.monsters = [];
  game.heroes = [];
  game.particles = [];
  game.cameraOffset = { x: 0, y: 0 };

  game.map = [];
  for (let x = 0; x < COLS; x++) {
    game.map[x] = [];
    for (let y = 0; y < ROWS; y++) {
      game.map[x][y] = { 
        wall: y >= 2, 
        isSky: y < 2,
        filter: null // マスごとの環境フィルター
      };
    }
  }
  
  game.message = `ステージ ${game.round}：WASDで採掘。魔王の��みに呼応し魔物が蠢く。残り ${game.digsLeft}回`;
}

function startBattle() {
  game.phase = 'battle';
  spawnHeroes(game.round); // ステージ数に応じた勇者数
  game.message = '侵攻開始！魔王の迷宮が試される。';
}

function applyScreenShake() {
  const shake = () => {
    game.cameraOffset = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
    requestAnimationFrame(() => setTimeout(() => game.cameraOffset = { x: 0, y: 0 }, 50));
  };
  shake();
}

function updateMonsters() {
  // 魔王の動きに合わせて魔物も1歩進む
  game.monsters.forEach(m => {
    const dx = Math.sign(game.player.x - m.x);
    const dy = Math.sign(game.player.y - m.y);
    if (!game.map[m.x + dx]?.[m.y + dy]?.wall) {
      m.x += dx; m.y += dy;
    }
  });
}

function tryMove(dx, dy) {
  if (game.phase === 'over' || game.phase === 'win') {
    if (game.phase === 'over') game.round = 1;
    init(); return;
  }

  const nx = game.player.x + dx, ny = game.player.y + dy;
  if (!inBounds(nx, ny) || game.map[nx][ny].isSky) return;

  const cell = game.map[nx][ny];

  if (cell.wall) {
    if (game.phase !== 'dig' || game.digsLeft <= 0) return;

    cell.wall = false;
    game.digsLeft--;
    applyScreenShake();
    addParticle(nx, ny, '#4a90e2');

    if (Math.random() < 0.8) spawnMonster(nx, ny);
    
    // 設置型間接干渉：掘った場所に「魔力溜まり」を配置（魔物の成長を促進するゾーン）
    if (game.digsLeft % 5 === 0) {
      cell.filter = 'mana_pool';
      game.message = '魔力溜まりを設置した！魔物の進化が加速する。';
    }

    game.player.x = nx; game.player.y = ny;
    updateMonsters();

    if (game.digsLeft <= 0) startBattle();
    else game.message = `深淵を刻む... 残り ${game.digsLeft}回`;
  } else {
    game.player.x = nx; game.player.y = ny;
    updateMonsters();
  }
}

function onKey(e) {
  const moves = { 'w': [0, -1], 's': [0, 1], 'a': [-1, 0], 'd': [1, 0] };
  if (moves[e.key.toLowerCase()]) {
    e.preventDefault();
    tryMove(...moves[e.key.toLowerCase()]);
  }
}
window.addEventListener('keydown', onKey);
// ===END:INIT_INPUT===

// ===SECTION:UPDATE===
function update(dt) {
  // パーティクルの更新
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 1.5;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  // ステージレベルに応じた勇者侵攻ロジックの強化
  // 魔物の数や種類（生態系の強さ）を勇者が感知するAI補正
  const updateHeroStrategy = () => {
    const totalMonsterPower = game.monsters.reduce((acc, m) => acc + m.power, 0);
    game.heroes.forEach(h => {
      // 魔物が多いほど勇者は慎重に（または集団で）攻める補正
      h.aggression = 1.0 + (game.round * 0.2) + (totalMonsterPower > 50 ? 0.5 : 0);
      h.target = game.monsters.length > 0 ? game.monsters[0] : null;
    });
  };

  if (game.phase === 'dig') {
    // 採掘フェイズ：魔王の移動に合わせて魔物も1歩動く仕様を反映
    // 生態系更新は updateEcosystem に集約
    updateEcosystem(); 
  } else if (game.phase === 'battle') {
    // バトルフェイズ：勇者の侵攻強化と生態系の連鎖
    updateHeroStrategy();
    updateEcosystem();
    updateHeroes(dt);

    // 勝敗判定
    if (game.heroes.length === 0) {
      game.phase = 'win';
      game.round++;
      game.message = `第${game.round}ラウンドへ突入！ 勇者の増援が近づく...`;
      spawnHeroesForStage(game.round); // ステージレベルに応じた勇者生成
    } else if (game.monsters.length === 0) {
      game.phase = 'over';
      game.message = '魔物が全滅した… 敗北。WASDで再挑戦';
    }
  }
}

function spawnHeroesForStage(round) {
  // ステージレベル(round)に応じて勇者の数と強さを調整
  const heroCount = Math.min(1 + Math.floor(round / 2), 5);
  for (let i = 0; i < heroCount; i++) {
    game.heroes.push({
      x: 0, y: 0, 
      hp: 10 * round, 
      level: round,
      aggression: 1.0
    });
  }
}
// ===END:UPDATE===

// ===SECTION:RENDER===
function render() {
  const W = COLS * TILE, H = ROWS * TILE;
  const headerH = 80;
  const now = Date.now();

  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H + headerH);

  // 1. 地形描画：地層の深みと質感の強化
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      const c = game.map[x] && game.map[x][y];
      if (!c) continue;
      const sx = x * TILE, sy = y * TILE + headerH;
      
      if (c.wall) {
        // 岩盤の重厚なテクスチャ
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.strokeStyle = '#2d2d4a';
        ctx.lineWidth = 1;
        ctx.strokeRect(sx, sy, TILE, TILE);
        ctx.fillStyle = '#252540';
        ctx.fillRect(sx + 6, sy + 6, TILE - 12, TILE - 12);
      } else {
        // 通路の荒涼感
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.strokeStyle = '#151522';
        ctx.strokeRect(sx, sy, TILE, TILE);
        // 床のノイズ的な質感
        if ((x + y) % 3 === 0) {
            ctx.fillStyle = '#12121c';
            ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
        }
      }
    }
  }

  // 2. 採掘可能範囲：視認性の高いパルス演出
  if (game.phase === 'dig' && game.digsLeft > 0) {
    const pulse = (Math.sin(now / 300) + 1) / 2;
    [[0, -1], [0, 1], [-1, 0], [1, 0]].forEach(([dx, dy]) => {
      const tx = game.player.x + dx, ty = game.player.y + dy;
      if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS && game.map[tx][ty].wall) {
        ctx.strokeStyle = `rgba(100, 255, 255, ${0.4 + pulse * 0.4})`;
        ctx.lineWidth = 4;
        ctx.strokeRect(tx * TILE + 6, ty * TILE + 6 + headerH, TILE - 12, TILE - 12);
        ctx.fillStyle = `rgba(0, 200, 255, ${0.1 + pulse * 0.2})`;
        ctx.fillRect(tx * TILE + 2, ty * TILE + 2 + headerH, TILE - 4, TILE - 4);
      }
    });
  }

  // 3. 魔物描画：種族ごとの固有形状と呼吸アニメ
  game.monsters.forEach(m => {
    const cx = m.x * TILE + TILE / 2, cy = m.y * TILE + TILE / 2 + headerH;
    const breathe = Math.sin(now / 300) * 3;
    
    ctx.save();
    if (m.type === 1) { // 捕食者：鋭利な三角形
      ctx.fillStyle = '#ff4757';
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff4757';
      ctx.beginPath(); 
      ctx.moveTo(cx, cy - 12 + breathe); 
      ctx.lineTo(cx + 14, cy + 12 + breathe); 
      ctx.lineTo(cx - 14, cy + 12 + breathe); 
      ctx.closePath(); ctx.fill();
    } else { // 被食者：柔らかい円形
      ctx.fillStyle = '#2ed573';
      ctx.shadowBlur = 10; ctx.shadowColor = '#2ed573';
      ctx.beginPath(); ctx.arc(cx, cy + breathe, 8, 0, Math.PI*2); ctx.fill();
    }
    
    if (m.justFed) { // 捕食エフェクト
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  });

  // 4. 勇者描画：光輝く侵入者
  game.heroes.forEach(h => {
    const hx = h.x * TILE, hy = h.y * TILE + headerH;
    ctx.fillStyle = '#f1c40f';
    ctx.shadowBlur = 15; ctx.shadowColor = '#f1c40f';
    ctx.beginPath(); ctx.rect(hx + 8, hy + 8, TILE - 16, TILE - 16); ctx.fill();
    ctx.shadowBlur = 0;
    // HPバー
    ctx.fillStyle = '#333'; ctx.fillRect(hx + 4, hy - 10, TILE - 8, 5);
    ctx.fillStyle = '#e74c3c'; ctx.fillRect(hx + 4, hy - 10, (TILE - 8) * (h.hp / h.maxHp), 5);
  });

  // 5. 魔王描画：中心に鎮座するコア
  ctx.save();
  ctx.shadowBlur = 25; ctx.shadowColor = '#00d2ff';
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(game.player.x * TILE + TILE / 2, game.player.y * TILE + TILE / 2 + headerH, 8, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // 6. HUD：洗練されたUIレイアウト
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, headerH);
  ctx.strokeStyle = '#252540'; ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, W, headerH);
  
  ctx.fillStyle = '#888';
  ctx.font = '14px "Segoe UI"';
  ctx.fillText('STAGE', 20, 30);
  ctx.fillText('ROUND', 100, 30);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px "Segoe UI"';
  ctx.fillText(game.stageLevel, 25, 60);
  ctx.fillText(game.round, 105, 60);
  
  ctx.fillStyle = '#00d2ff';
  ctx.font = 'bold 36px "Segoe UI"';
  ctx.textAlign = 'right';
  ctx.fillText(`DIGS: ${game.digsLeft}`, W - 20, 55);

  // 7. 終了演出：シネマティックなオーバーレイ
  if (game.gameOver || game.victory) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H + headerH);
    ctx.fillStyle = game.victory ? '#ffd700' : '#ff4757';
    ctx.textAlign = 'center';
    ctx.font = 'bold 72px "Impact"';
    ctx.fillText(game.victory ? 'LEVEL CLEAR' : 'DUNGEON COLLAPSED', W/2, (H+headerH)/2);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Arial';
    ctx.fillText('PRESS SPACE TO CONTINUE', W/2, (H+headerH)/2 + 60);
  }
}
// ===END:RENDER===

    // --- 起動コード（セクション外・防御的に呼び出す） ---
    window.addEventListener('resize', function () { if (typeof resize === 'function') resize(); });
    if (typeof resize === 'function') resize();
    if (typeof init === 'function') init();
    let __lastTs = 0;
    function __loop(ts) {
      const dt = Math.min(0.05, ((ts - __lastTs) || 16) / 1000);
      __lastTs = ts;
      if (typeof update === 'function') update(dt);
      if (typeof render === 'function') render();
      requestAnimationFrame(__loop);
    }
    requestAnimationFrame(__loop);
  </script>
</body>
</html>
