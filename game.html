<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ===SECTION:CONFIG===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;
const ROWS = 15;
const HUD_HEIGHT = 120;
const TILE_SIZE = Math.min(window.innerWidth / COLS, (window.innerHeight - HUD_HEIGHT) / ROWS);

let mouseX = 0;
let mouseY = 0;
let playerX = Math.floor(COLS / 2);
let playerY = 0;

const FILTERS = { NONE: null, NURSERY: 'NURSERY', SANCTUARY: 'SANCTUARY', RESOURCE: 'RESOURCE' };
const VISIBILITY_RADIUS = 3;

let map = [];

function initMap() {
    map = [];
    for (let y = 0; y < ROWS; y++) {
        map[y] = [];
        for (let x = 0; x < COLS; x++) {
            map[y][x] = {
                type: 'wall',
                nutrient: Math.floor(Math.random() * 50),
                filter: FILTERS.NONE
            };
        }
    }
    
    map[playerY][playerX] = {
        type: 'ground',
        nutrient: 0,
        filter: FILTERS.NONE
    };
}

initMap();
// ===END:CONFIG===

// ===SECTION:STATE===
let game = {
  round: 1,
  digsLeft: 10,
  interferencePoints: 5,
  phase: 'dig',
  playerX: 10,
  playerY: 0,
  visionRadius: 3,
  map: [],
  monsters: [],
  grid: [],
  heroes: [],
  particles: [],
  message: '魔王よ、地面を掘り、魔物の揺りかごを作れ (十字キーで移動、隣接マスを採掘)',

  canDig(x, y) {
    const dx = Math.abs(x - this.playerX);
    const dy = Math.abs(y - this.playerY);
    // 隣接マスの定義（斜めを除く上下左右）
    return (dx + dy === 1) && 
           (x >= 0 && x < this.map.length) && 
           (y >= 0 && y < this.map[0].length) &&
           (this.map[x][y].type === 'wall');
  }
};

function getAttractiveness(x, y) {
  const cell = game.map[x][y];
  if (!cell || !cell.filter) return 1.0;
  const f = cell.filter;
  if (f === FILTERS.NURSERY) return 3.0;
  if (f === FILTERS.SANCTUARY) return 2.0;
  if (f === FILTERS.RESOURCE) return 2.5;
  return 1.0;
}

function addParticle(x, y, color, life = 1.0) {
  game.particles.push({
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,
    vx: (Math.random() - 0.5) * 50,
    vy: (Math.random() - 0.5) * 50,
    life: life,
    color: color
  });
}
// ===END:STATE===

// ===SECTION:ECOSYSTEM===
function mutate(val, nutrient) {
  const factor = Math.max(0.2, Math.min(1.0, nutrient / 5.0));
  return Math.max(0.1, val * (0.95 + Math.random() * 0.1 * factor));
}

function createMonster(x, y, type, parentGenes = null, generation = 1, parentId = 0, nutrient = 1.0) {
  const genes = parentGenes ? {
    speed: mutate(parentGenes.speed, nutrient),
    metabolism: mutate(parentGenes.metabolism, nutrient),
    reproThreshold: mutate(parentGenes.reproThreshold, nutrient),
    size: mutate(parentGenes.size || 1.0, nutrient),
    appearance: {
      shapeType: parentGenes.appearance.shapeType,
      colorBase: Math.max(0, Math.min(360, parentGenes.appearance.colorBase + (Math.random() * 40 - 20)))
    }
  } : {
    speed: 0.5 + Math.random() * 0.5,
    metabolism: 0.8 + Math.random() * 0.4,
    reproThreshold: 80 + Math.random() * 40,
    size: 0.8 + Math.random() * 0.4,
    appearance: {
      shapeType: Math.floor(Math.random() * 3),
      colorBase: type === 1 ? Math.random() * 60 : 180 + Math.random() * 120
    }
  };

  return { 
    id: ++monsterCounter, 
    parentId, 
    generation, 
    x, y, 
    hp: 10 + (genes.size * 5), 
    type, 
    energy: 50, 
    lastMoveTime: 0, 
    genes, 
    isSettled: false,
    alpha: 0.8 + (genes.size * 0.2)
  };
}

function updateGrid() {
  game.grid = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => []));
  game.monsters.forEach(m => {
    if (m.x >= 0 && m.x < COLS && m.y >= 0 && m.y < ROWS) {
      game.grid[Math.floor(m.x)][Math.floor(m.y)].push(m);
    }
  });
}

function resize() {
  const pixelRatio = window.devicePixelRatio || 1;
  const availW = window.innerWidth;
  const availH = window.innerHeight - HUD;
  TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
  
  canvas.width = COLS * TILE * pixelRatio;
  canvas.height = (ROWS * TILE + HUD) * pixelRatio;
  canvas.style.width = (COLS * TILE) + "px";
  canvas.style.height = (ROWS * TILE + HUD) + "px";
  
  const ctx = canvas.getContext('2d');
  ctx.scale(pixelRatio, pixelRatio);
}
// ===END:ECOSYSTEM===

// ===SECTION:INIT_INPUT===
let playerX = Math.floor(COLS / 2);
let playerY = 0;

function init() {
  resize();
  game.map = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => ({ type: 'wall', filter: null })));
  game.monsters = [];
  game.heroes = [];
  game.particles = [];
  game.phase = 'dig';
  game.digsLeft = 10 + (game.round - 1) * 2;
  game.interferencePoints = 5 + game.round;
  playerX = Math.floor(COLS / 2);
  playerY = 0;
  game.message = `ラウンド ${game.round}：十字キーで移動、壁に接触して採掘せよ。残り:${game.digsLeft}`;
  updateGrid();
}

function onDig(x, y) {
  if (game.phase !== 'dig' || game.digsLeft <= 0) return;
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS || game.map[x][y].type !== 'wall') return;

  game.map[x][y].type = 'ground';
  game.digsLeft--;

  if (Math.random() < 0.7) {
    game.monsters.push(createMonster(x, y, Math.random() > 0.5 ? 'slime' : 'bat'));
  }

  if (game.digsLeft <= 0) {
    game.phase = 'battle';
    game.message = '掘削終了。勇者の侵攻が始まった！';
    for (let i = 0; i < 2 + game.round; i++) {
      game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 30 + game.round * 10, target: null });
    }
  } else {
    game.message = `採掘中... 残り:${game.digsLeft}`;
  }
  updateGrid();
}

window.addEventListener('keydown', (e) => {
  if (game.phase === 'over') { game.round = 1; init(); return; }
  if (game.phase !== 'dig') return;

  let dx = 0, dy = 0;
  switch (e.key) {
    case 'ArrowUp': dy = -1; break;
    case 'ArrowDown': dy = 1; break;
    case 'ArrowLeft': dx = -1; break;
    case 'ArrowRight': dx = 1; break;
    default: return;
  }

  const nx = playerX + dx;
  const ny = playerY + dy;

  if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
    if (game.map[nx][ny].type === 'wall') {
      onDig(nx, ny);
    } else {
      playerX = nx;
      playerY = ny;
    }
  }
  updateGrid();
});

function onFilter(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cx = Math.floor((e.clientX - rect.left) / TILE);
  const cy = Math.floor((e.clientY - rect.top) / TILE);
  if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy].type !== 'ground' || game.interferencePoints <= 0) return;

  const filters = [null, 'nursery', 'sanctuary', 'resource'];
  let currentIdx = filters.indexOf(game.map[cx][cy].filter);
  game.map[cx][cy].filter = filters[(currentIdx + 1) % filters.length];
  game.interferencePoints--;
  updateGrid();
}
// ===END:INIT_INPUT===

// ===SECTION:UPDATE===
function dig(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS || game.map[y][x].value === 0 || game.digsLeft <= 0) return;

  game.map[y][x].value = 0;
  game.digsLeft--;

  const nutrient = game.map[y][x].nutrient;
  if (Math.random() < nutrient * 0.2) {
    const type = Math.random() < 0.3 ? 1 : 0; // 0:草食, 1:肉食
    game.monsters.push(createMonster(x, y, type, {
      speed: 0.2 + Math.random() * 0.5,
      size: 0.1 + Math.random() * 0.4,
      reproThreshold: 50 + Math.random() * 50
    }, 0, Date.now() + Math.random()));
  }
}

function update(dt) {
  game.particles.forEach((p, i) => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  });

  if (game.phase === 'battle') {
    updateGrid();

    for (let i = game.monsters.length - 1; i >= 0; i--) {
      let m = game.monsters[i];
      m.energy -= (m.genes.speed * 0.5 + m.genes.size * 0.2) * dt;

      if (m.type === 1) {
        let targets = game.grid[m.y][m.x].filter(o => o.type === 0);
        if (targets.length > 0) {
          m.energy += targets[0].energy * 0.5;
          targets[0].energy = -1;
          addParticle(m.x, m.y, '#ff0000');
        }
      }

      m.lastMoveTime += dt;
      if (m.lastMoveTime > (1.1 - m.genes.speed)) {
        let neighbors = [];
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            let ny = m.y + dy, nx = m.x + dx;
            if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS && game.map[ny][nx].value === 0) {
              neighbors.push({x: nx, y: ny});
            }
          }
        }
        if (neighbors.length > 0) {
          let next = neighbors[Math.floor(Math.random() * neighbors.length)];
          m.x = next.x; m.y = next.y;
        }
        m.lastMoveTime = 0;
      }

      if (m.energy > m.genes.reproThreshold) {
        m.energy /= 2;
        game.monsters.push(createMonster(m.x, m.y, m.type, {...m.genes}, m.generation + 1, m.id));
        addParticle(m.x, m.y, '#ffff00');
      }

      if (m.energy <= 0) game.monsters.splice(i, 1);
    }

    game.heroes.forEach((h, idx) => {
      h.timer += dt;
      if (h.timer > 0.8) {
        h.timer = 0;
        let best = {x: h.x, y: h.y, score: -1};
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            let ny = h.y + dy, nx = h.x + dx;
            if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS) {
              let score = (game.grid[ny][nx] ? game.grid[ny][nx].length : 0) * 10 + Math.random();
              if (score > best.score) best = {x: nx, y: ny, score: score};
            }
          }
        }
        h.x = best.x; h.y = best.y;
        if (game.grid[h.y][h.x].length > 0) game.grid[h.y][h.x][0].energy -= h.atk;
      }
      if (h.hp <= 0) game.heroes.splice(idx, 1);
    });

    if (game.monsters.length === 0) {
      game.phase = 'over';
      game.message = 'ダンジョン崩壊...';
    } else if (game.heroes.length === 0) {
      game.round++;
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round * 2);
    }
  }
}
// ===END:UPDATE===

// ===SECTION:RENDER===
function render() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const VISIBILITY_RADIUS = 5;

  function isVisible(x, y) {
    const dx = x - game.playerX;
    const dy = y - game.playerY;
    return Math.sqrt(dx * dx + dy * dy) <= VISIBILITY_RADIUS;
  }

  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      const visible = isVisible(x, y);
      const d = Math.min(1, game.map[x][y].value / 3);
      ctx.fillStyle = visible ? `rgb(${d * 30}, ${d * 120 + 20}, ${d * 60})` : '#050505';
      ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);

      if (visible && game.map[x][y].filter) {
        ctx.fillStyle = game.map[x][y].filter === FILTERS.NURSERY ? 'rgba(100,255,100,0.3)' : 'rgba(255,255,100,0.3)';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }

  game.monsters.forEach(m => {
    if (!isVisible(m.x, m.y)) return;
    const px = m.x * TILE + TILE / 2;
    const py = m.y * TILE + TILE / 2;
    const size = (TILE / 2.5) * (m.genes.size || 1);
    ctx.fillStyle = `hsl(${m.appearance.colorBase}, 70%, 50%)`;

    ctx.beginPath();
    if (m.appearance.shapeType === 0) {
      ctx.arc(px, py, size, 0, Math.PI * 2);
    } else if (m.appearance.shapeType === 1) {
      for (let i = 0; i < 4; i++) {
        const angle = (i * Math.PI / 2) + Math.PI / 4;
        const x = px + Math.cos(angle) * size * 1.2;
        const y = py + Math.sin(angle) * size * 1.2;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
    } else {
      for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? size : size / 2;
        const angle = (i * Math.PI / 5) - Math.PI / 2;
        ctx.lineTo(px + Math.cos(angle) * r, py + Math.sin(angle) * r);
      }
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.stroke();
  });

  game.heroes.forEach(h => {
    if (!isVisible(h.x, h.y)) return;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#fff';
    ctx.fillRect(h.x * TILE + 4, h.y * TILE + 4, TILE - 8, TILE - 8);
    ctx.shadowBlur = 0;
  });

  game.particles.forEach(p => {
    if (!isVisible(Math.floor(p.x / TILE), Math.floor(p.y / TILE))) return;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1.0;

  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!isVisible(x, y)) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, ROWS * TILE, canvas.width, 100);
  ctx.fillStyle = '#eee';
  ctx.font = 'bold 14px Arial';
  ctx.fillText(`ROUND: ${game.round} | DIGS: ${game.digsLeft} | MP: ${game.interferencePoints}`, 20, ROWS * TILE + 30);
  ctx.font = '12px monospace';
  ctx.fillText(game.message, 20, ROWS * TILE + 55);
}
// ===END:RENDER===

    let last = 0;
    function loop(ts) { update((ts - last) / 1000); render(); last = ts; requestAnimationFrame(loop); }
    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    canvas.addEventListener('contextmenu', onFilter);
    init(); requestAnimationFrame(loop);
  </script>
</body>
</html>
