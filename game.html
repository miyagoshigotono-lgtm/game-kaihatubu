<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 15;
    const HUD = 120;
    let TILE = 40;
    let mouse = { x: 0, y: 0 };

    let game = {
      round: 1,
      digsLeft: 10,
      phase: 'dig',
      map: [],
      monsters: [],
      heroes: [],
      particles: [],
      decals: [],
      message: '魔王よ、地面を掘り、魔物の揺りかごを作れ'
    };

    function addParticle(x, y, type) {
      game.particles.push({ x: x * TILE + TILE/2, y: y * TILE + TILE/2, type, life: 1.0 });
    }

    function resize() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HUD;
      TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
      canvas.width = COLS * TILE;
      canvas.height = ROWS * TILE + HUD;
    }

    function init() {
      resize();
      game.map = Array.from({ length: COLS }, () => Array(ROWS).fill(0));
      game.monsters = [];
      game.heroes = [];
      game.particles = [];
      game.decals = [];
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round - 1) * 2;
      game.message = 'ラウンド ' + game.round + '：ダンジョンを掘り進めよ';
    }

    function onDig(e) {
      if (game.phase === 'over') { game.round = 1; init(); return; }
      if (game.phase !== 'dig' || game.digsLeft <= 0) return;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy] !== 0) return;
      
      const rand = Math.random();
      game.map[cx][cy] = rand < 0.25 ? 2 : 1;
      game.digsLeft--;
      
      if (Math.random() < 0.6) {
        game.monsters.push({ x: cx, y: cy, hp: 5, lv: 1, hunger: 60, type: Math.random() > 0.3 ? 0 : 1, age: 0, isDiseased: false });
      }

      if (game.digsLeft <= 0) {
        game.phase = 'battle';
        game.message = '勇者が侵攻を開始した！';
        for (let i = 0; i < 2 + game.round; i++) {
          game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 10 + game.round * 5, t: 0 });
        }
      }
    }

    function update(dt) {
      game.particles.forEach((p, i) => { p.life -= dt * 2; if (p.life <= 0) game.particles.splice(i, 1); });
      game.decals.forEach((d, i) => { d.life -= dt; if (d.life <= 0) game.decals.splice(i, 1); });

      if (game.phase !== 'battle') return;

      for (let i = game.monsters.length - 1; i >= 0; i--) {
        let m = game.monsters[i];
        m.age++;
        
        let hungerDrain = 5;
        if (game.map[m.x][m.y] === 2) {
            m.hunger += 15;
        } else if (game.map[m.x][m.y] === 3) {
            m.hunger += 40;
            if (Math.random() < 0.05) m.isDiseased = true;
        }
        m.hunger -= (hungerDrain + (m.isDiseased ? 5 : 0)) * dt;

        if (Math.random() < 0.1) {
          const nx = m.x + Math.floor(Math.random() * 3) - 1;
          const ny = m.y + Math.floor(Math.random() * 3) - 1;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[nx][ny] >= 1) {
            m.x = nx; m.y = ny;
          }
        }

        if (m.type === 1) {
          game.monsters.forEach(target => {
            if (target.type === 0 && target.x === m.x && target.y === m.y) {
              m.hunger += 60; target.hp = 0;
              addParticle(m.x, m.y, 'blood');
              game.decals.push({ x: m.x, y: m.y, life: 5 });
              game.map[m.x][m.y] = 3;
            }
          });
        }

        if (m.hunger >= 100) {
          m.hunger -= 50;
          game.monsters.push({ x: m.x, y: m.y, hp: 5, lv: 1, hunger: 50, type: m.type, age: 0, isDiseased: false });
        }

        if (m.hunger <= 0 || m.hp <= 0 || (m.isDiseased && m.age > 500)) game.monsters.splice(i, 1);
      }

      game.heroes.forEach((h, idx) => {
        h.t += dt;
        if (h.t > 0.8) {
          h.t = 0;
          let target = game.monsters.length > 0 ? game.monsters.reduce((prev, curr) => 
            (Math.abs(curr.x - h.x) + Math.abs(curr.y - h.y)) < (Math.abs(prev.x - h.x) + Math.abs(prev.y - h.y)) ? curr : prev
          ) : null;
          if (target) {
            if (target.x !== h.x) h.x += (target.x > h.x ? 1 : -1);
            else if (target.y !== h.y) h.y += (target.y > h.y ? 1 : -1);
            if (h.x === target.x && h.y === target.y) target.hp -= 2;
          }
        }
        if (h.hp <= 0) game.heroes.splice(idx, 1);
      });

      if (game.monsters.length === 0) { game.phase = 'over'; game.message = '魔物が全滅した... 敗北。クリックで再挑戦'; }
      else if (game.heroes.length === 0) { game.round++; game.phase = 'dig'; game.digsLeft = 10 + (game.round - 1) * 2; game.message = '防衛成功。ラウンド ' + game.round + ' へ'; }
    }

    function render() {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      let nutrients = 0;
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          let color = '#1a1a2e';
          if (game.map[x][y] === 2) { color = '#4a3a2e'; nutrients++; }
          else if (game.map[x][y] === 3) { color = '#3a1a1a'; nutrients += 2; }
          ctx.fillStyle = color;
          ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        }
      }
      game.monsters.forEach(m => {
        ctx.fillStyle = m.isDiseased ? '#888' : (m.type === 0 ? '#44ff44' : '#ff4444');
        ctx.fillRect(m.x * TILE + 5, m.y * TILE + 5, TILE - 10, TILE - 10);
      });
      game.heroes.forEach(h => { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(h.x * TILE + TILE/2, h.y * TILE + TILE/2, TILE/3, 0, Math.PI*2); ctx.fill(); });
      
      ctx.fillStyle = '#333'; ctx.fillRect(20, ROWS * TILE + 20, 200, 10);
      ctx.fillStyle = '#0f0'; ctx.fillRect(20, ROWS * TILE + 20, Math.min(200, nutrients * 5), 10);
      ctx.fillStyle = '#fff'; ctx.fillText(`栄養密度`, 20, ROWS * TILE + 45);
      ctx.fillText(`Round: ${game.round} | 掘削: ${game.digsLeft} | 魔物: ${game.monsters.length} | 勇者: ${game.heroes.length}`, 20, ROWS * TILE + 70);
      ctx.fillText(game.message, 20, ROWS * TILE + 100);
    }

    let last = 0;
    function loop(ts) { update((ts - last) / 1000); render(); last = ts; requestAnimationFrame(loop); }
    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    init(); requestAnimationFrame(loop);
  </script>
</body>
</html>
