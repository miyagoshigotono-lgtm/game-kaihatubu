<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ===SECTION:CONFIG===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;
const ROWS = 14;
const HUD = 70;
let TILE = 32;
let monsterId = 0;
let scaleFactor = 1;

const GAME_PARAMS = {
  moveSpeed: 0.15,
  digCooldown: 300,
  spawnRate: 0.05,
  maxEnergy: 100
};

const COLORS = {
  ground:   '#15101f',
  wall:     '#2a1f3d',
  wallEdge: '#3c2c57',
  player:   '#c879ff',
  prey:     '#5bd6a0',
  predator: '#ff6b6b',
  hero:     '#ffd23f',
  hud:      '#181222'
};

let mouseX = 0;
let mouseY = 0;

function resize() {
  const pixelRatio = window.devicePixelRatio || 1;
  const availW = Math.min(window.innerWidth, 1200);
  const availH = window.innerHeight - HUD - 4;
  
  TILE = Math.max(16, Math.floor(Math.min(availW / COLS, availH / ROWS)));
  scaleFactor = TILE / 32;

  canvas.width = (COLS * TILE) * pixelRatio;
  canvas.height = (ROWS * TILE + HUD) * pixelRatio;
  
  canvas.style.width = (COLS * TILE) + 'px';
  canvas.style.height = (ROWS * TILE + HUD) + 'px';
  
  ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
}

window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / TILE;
  mouseY = (e.clientY - rect.top) / TILE;
});

resize();
// ===END:CONFIG===

// ===SECTION:STATE===
const game = {
  round: 1,
  phase: 'dig',
  digsLeft: 12,
  player: {
    x: Math.floor(COLS / 2),
    y: Math.floor(ROWS / 2),
    canDig: { up: false, down: false, left: false, right: false }
  },
  map: Array.from({ length: COLS }, (_, x) =>
    Array.from({ length: ROWS }, (_, y) => ({
      wall: true,
      health: 100,
      type: 'rock',
      lastDug: false
    }))
  ),
  monsters: [],
  heroes: [],
  particles: [],
  message: '魔王よ、迷宮を掘り進め、生態系を築くのだ。'
};

function inBounds(x, y) {
  return x >= 0 && x < COLS && y >= 0 && y < ROWS;
}

function canDig(x, y) {
  return inBounds(x, y) && game.map[x][y].wall;
}

function updateDigAvailability() {
  const p = game.player;
  p.canDig.up = canDig(p.x, p.y - 1);
  p.canDig.down = canDig(p.x, p.y + 1);
  p.canDig.left = canDig(p.x - 1, p.y);
  p.canDig.right = canDig(p.x + 1, p.y);
}

function isGround(x, y) {
  return inBounds(x, y) && game.map[x][y] && !game.map[x][y].wall;
}

function getTile(x, y) {
  return inBounds(x, y) ? game.map[x][y] : null;
}

function addParticle(x, y, color) {
  game.particles.push({
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,
    vx: (Math.random() - 0.5) * 60,
    vy: (Math.random() - 0.5) * 60,
    life: 1,
    color: color
  });
}
// ===END:STATE===

// ===SECTION:ECOSYSTEM===
function createMonster(x, y, type) {
  return { 
    id: ++monsterId, 
    x: x, 
    y: y, 
    type: type, 
    hp: type === 1 ? 14 : 8, 
    energy: 40, 
    cooldown: Math.random() 
  };
}

function digTile(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS || !game.map[y][x].wall) return;

  game.map[y][x].wall = false;
  
  // 採掘時の爽快感：土の破片パーティクルを複数生成
  for (let i = 0; i < 8; i++) {
    addParticle(x, y, '#8B4513');
  }

  // 掘削地点から生態系が発生
  spawnMonster(x, y, 0.3);
}

function spawnMonster(x, y, chainChance = 0.2) {
  const type = Math.random() < 0.35 ? 1 : 0;
  game.monsters.push(createMonster(x, y, type));
  
  // 生態系発生アルゴリズム：土の残滓から��鎖的に魔物が発生
  if (Math.random() < chainChance) {
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[ny][nx].wall) {
        if (Math.random() < 0.4) {
          game.map[ny][nx].wall = false;
          addParticle(nx, ny, '#553311');
          spawnMonster(nx, ny, chainChance * 0.5);
          break;
        }
      }
    }
  }
}

function groundNeighbors(x, y) {
  const out = [];
  const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
  for (const [dx, dy] of dirs) {
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !game.map[ny][nx].wall) out.push([nx, ny]);
  }
  return out;
}

function nearestHero(x, y) {
  let best = null, bestD = Infinity;
  for (const h of game.heroes) {
    const d = Math.abs(h.x - x) + Math.abs(h.y - y);
    if (d < bestD) { bestD = d; best = h; }
  }
  return { hero: best, dist: bestD };
}

function updateEcosystem(dt) {
  for (let i = game.monsters.length - 1; i >= 0; i--) {
    const m = game.monsters[i];
    m.energy -= dt * (m.type === 1 ? 3 : 2);
    m.cooldown -= dt;

    if (m.cooldown <= 0) {
      const opts = groundNeighbors(m.x, m.y);
      if (opts.length) { 
        const p = opts[(Math.random() * opts.length) | 0]; 
        m.x = p[0]; m.y = p[1]; 
      }
      m.cooldown = 0.6 + Math.random() * 0.4;

      if (m.type === 1) {
        const prey = game.monsters.find(o => o.type === 0 && o.x === m.x && o.y === m.y);
        if (prey) { prey.hp -= 8; m.energy += 20; addParticle(m.x, m.y, '#ff44ff'); }
      }
      
      const nh = nearestHero(m.x, m.y);
      if (nh.hero && nh.dist <= 1) { 
        nh.hero.hp -= 2; 
        addParticle(nh.hero.x, nh.hero.y, '#ff6b6b'); 
      }

      if (m.energy > 80) {
        m.energy -= 40;
        spawnMonster(m.x, m.y, 0);
        addParticle(m.x, m.y, '#00ff88');
      }
    }
    if (m.energy <= 0 || m.hp <= 0) game.monsters.splice(i, 1);
  }
}

function spawnHeroes(n) {
  for (let i = 0; i < n; i++) {
    let y = (Math.random() * ROWS) | 0;
    if (game.map[y][0].wall) game.map[y][0].wall = false;
    game.heroes.push({ x: 0, y: y, hp: 30 + game.round * 10, cooldown: 0 });
  }
}

function updateHeroes(dt) {
  for (let i = game.heroes.length - 1; i >= 0; i--) {
    const h = game.heroes[i];
    h.cooldown -= dt;
    if (h.cooldown <= 0) {
      const target = game.monsters.reduce((prev, curr) => {
        const d = Math.abs(curr.x - h.x) + Math.abs(curr.y - h.y);
        return (d < prev.d) ? {m: curr, d: d} : prev;
      }, {m: null, d: Infinity}).m;

      if (target) {
        const dx = Math.sign(target.x - h.x), dy = Math.sign(target.y - h.y);
        if (Math.abs(target.x - h.x) + Math.abs(target.y - h.y) <= 1) {
          target.hp -= 10; addParticle(target.x, target.y, '#ffd23f');
        } else if (Math.random() > 0.3) {
          if (dx !== 0 && !game.map[h.y][h.x + dx].wall) h.x += dx;
          else if (dy !== 0 && !game.map[h.y + dy][h.x].wall) h.y += dy;
        }
      }
      h.cooldown = 0.8;
    }
    if (h.hp <= 0) { addParticle(h.x, h.y, '#ffffff'); game.heroes.splice(i, 1); }
  }
}
// ===END:ECOSYSTEM===

// ===SECTION:INIT_INPUT===
function init() {
  game.round = game.round || 1;
  game.phase = 'dig';
  game.digsLeft = 10 + (game.round - 1) * 3;
  game.player = { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) };
  game.monsters = [];
  game.heroes = [];
  game.particles = [];

  game.map = Array.from({ length: COLS }, () =>
    Array.from({ length: ROWS }, () => ({ wall: true, monster: null }))
  );
  game.map[game.player.x][game.player.y].wall = false;

  if (typeof updateUI === 'function') updateUI();
}

function spawnMonster(x, y) {
  const types = ['スライム', 'ゴブリン', 'コウモリ'];
  const monster = {
    x, y, 
    type: types[Math.floor(Math.random() * types.length)],
    hp: 10 + game.round * 2,
    atk: 2 + Math.floor(game.round / 2)
  };
  game.monsters.push(monster);
  game.map[x][y].monster = monster;
  if (typeof addParticle === 'function') addParticle(x, y, '#4a9022');
}

function startBattle() {
  game.phase = 'battle';
  const heroCount = 2 + Math.floor(game.round / 2);
  for (let i = 0; i < heroCount; i++) {
    game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 20 + game.round * 5 });
  }
  if (typeof updateUI === 'function') updateUI();
}

function onDig(nx, ny) {
  if (game.digsLeft > 0 && nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[nx][ny].wall) {
    game.map[nx][ny].wall = false;
    game.digsLeft--;
    spawnMonster(nx, ny);
    if (typeof addParticle === 'function') addParticle(nx, ny, '#8b4513');
    
    if (game.digsLeft <= 0) {
      startBattle();
    } else if (typeof updateUI === 'function') {
      updateUI();
    }
  }
}

window.addEventListener('keydown', (e) => {
  if (game.phase !== 'dig') return;

  const moveMapping = { 'w': [0, -1], 'a': [-1, 0], 's': [0, 1], 'd': [1, 0] };
  const key = e.key.toLowerCase();

  if (moveMapping[key]) {
    const [dx, dy] = moveMapping[key];
    const nx = game.player.x + dx;
    const ny = game.player.y + dy;

    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !game.map[nx][ny].wall) {
      game.player.x = nx;
      game.player.y = ny;
      if (typeof updateUI === 'function') updateUI();
    }
  }

  if (e.code === 'Space') {
    const directions = [[0, -1], [0, 1], [-1, 0], [1, 0]];
    for (const [dx, dy] of directions) {
      onDig(game.player.x + dx, game.player.y + dy);
    }
  }
});
// ===END:INIT_INPUT===

// ===SECTION:UPDATE===
function update(dt) {
  // 1. クールダウン管理
  if (game.digCooldown > 0) game.digCooldown -= dt;

  // 2. 魔王の移動と採掘ロジック
  if (game.phase === 'dig' && game.digCooldown <= 0) {
    let nextX = game.player.x;
    let nextY = game.player.y;
    let moved = false;

    if (game.keys['w']) { nextY -= 1; moved = true; }
    else if (game.keys['s']) { nextY += 1; moved = true; }
    else if (game.keys['a']) { nextX -= 1; moved = true; }
    else if (game.keys['d']) { nextX += 1; moved = true; }

    if (moved) {
      if (game.map[nextY] && game.map[nextY][nextX] === 1) { // 1:壁
        game.map[nextY][nextX] = 0; // 壁を掘削
        spawnMonster(nextX, nextY);
        game.digCooldown = 0.5; // 採掘クールダウン
      } else if (game.map[nextY] && game.map[nextY][nextX] === 0) {
        game.player.x = nextX;
        game.player.y = nextY;
        game.digCooldown = 0.2; // 移動クールダウン
      }
    }
  }

  // 3. パーティクル更新
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.5;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  // 4. 魔物更新と生死判定
  for (let i = game.monsters.length - 1; i >= 0; i--) {
    const m = game.monsters[i];
    // ここに生態系（捕食・移動）の更新ロジックを統合
    if (m.hp <= 0) {
      game.monsters.splice(i, 1);
    }
  }

  // 5. 勇者AIとバトルロジック
  if (game.phase === 'battle') {
    for (let h of game.heroes) {
      let target = null;
      let minD = Infinity;
      for (let m of game.monsters) {
        const d = Math.abs(h.x - m.x) + Math.abs(h.y - m.y);
        if (d < minD) { minD = d; target = m; }
      }

      if (target) {
        if (minD <= 1) {
          target.hp -= h.atk * dt;
        } else {
          h.x += (h.x < target.x ? 1 : -1) * h.speed * dt;
          h.y += (h.y < target.y ? 1 : -1) * h.speed * dt;
        }
      }
    }

    // 勇者生死判定
    for (let i = game.heroes.length - 1; i >= 0; i--) {
      if (game.heroes[i].hp <= 0) game.heroes.splice(i, 1);
    }
  }

  // 6. 勝敗判定
  if (game.heroes.length === 0 && game.phase === 'battle') {
    game.phase = 'win';
    game.round++;
    game.message = '防衛成功！ ラウンド' + game.round + 'へ';
  } else if (game.monsters.length === 0 && game.phase === 'battle') {
    game.phase = 'over';
    game.message = '魔物が全滅した… 敗北';
  }
}
// ===END:UPDATE===

// ===SECTION:RENDER===
function render() {
  const W = COLS * TILE, H = ROWS * TILE;
  ctx.clearRect(0, 0, W, H + HUD);

  // 地形描画
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      const c = game.map[x] && game.map[x][y];
      if (!c) continue;
      
      if (c.wall) {
        ctx.fillStyle = COLORS.wall;
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        ctx.fillStyle = COLORS.wallEdge;
        ctx.fillRect(x * TILE + 2, y * TILE + 2, TILE / 2 - 2, TILE / 2 - 2);
        ctx.fillRect(x * TILE + TILE / 2 + 1, y * TILE + TILE / 2 + 1, TILE / 2 - 2, TILE / 2 - 2);
      } else {
        ctx.fillStyle = COLORS.ground;
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }

  // 採掘可能範囲のハイライト
  if (game.player && game.player.canDig) {
    const directions = [
      { dx: 0, dy: -1, key: 'up' },
      { dx: 0, dy: 1, key: 'down' },
      { dx: -1, dy: 0, key: 'left' },
      { dx: 1, dy: 0, key: 'right' }
    ];

    ctx.strokeStyle = COLORS.player + '88';
    ctx.lineWidth = 3;
    directions.forEach(d => {
      if (game.player.canDig[d.key]) {
        const tx = (game.player.x + d.dx) * TILE;
        const ty = (game.player.y + d.dy) * TILE;
        ctx.strokeRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
      }
    });
  }

  // 魔物
  for (const m of game.monsters) {
    const cx = m.x * TILE + TILE / 2;
    const cy = m.y * TILE + TILE / 2;
    ctx.fillStyle = (m.type === 1) ? COLORS.predator : COLORS.prey;
    ctx.beginPath();
    if (m.type === 1) {
      ctx.moveTo(cx, cy - TILE * 0.35);
      ctx.lineTo(cx + TILE * 0.35, cy + TILE * 0.35);
      ctx.lineTo(cx - TILE * 0.35, cy + TILE * 0.35);
    } else {
      ctx.arc(cx, cy, TILE * 0.28, 0, Math.PI * 2);
    }
    ctx.closePath();
    ctx.fill();
  }

  // 勇者
  for (const h of game.heroes) {
    ctx.fillStyle = COLORS.hero;
    ctx.fillRect(h.x * TILE + TILE * 0.2, h.y * TILE + TILE * 0.15, TILE * 0.6, TILE * 0.7);
    ctx.fillStyle = '#fff';
    ctx.fillRect(h.x * TILE + TILE * 0.3, h.y * TILE + TILE * 0.25, TILE * 0.1, TILE * 0.1);
  }

  // 魔王（プレイヤー）
  const px = game.player.x * TILE, py = game.player.y * TILE;
  const pulse = (Math.sin(Date.now() / 300) + 1) / 2;
  ctx.save();
  ctx.shadowColor = COLORS.player;
  ctx.shadowBlur = 10 + pulse * 15;
  ctx.fillStyle = COLORS.player;
  ctx.beginPath();
  ctx.moveTo(px + TILE / 2, py + TILE * 0.1);
  ctx.lineTo(px + TILE * 0.9, py + TILE / 2);
  ctx.lineTo(px + TILE / 2, py + TILE * 0.9);
  ctx.lineTo(px + TILE * 0.1, py + TILE / 2);
  ctx.fill();
  ctx.restore();

  // パーティクル
  for (const p of game.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, H, W, HUD);
  ctx.strokeStyle = COLORS.hud;
  ctx.strokeRect(0, H, W, HUD);
  
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`ROUND: ${game.round}`, 20, H + 30);
  ctx.fillText(`DIGS LEFT: ${game.digsLeft}`, 20, H + 55);
  
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(`MONSTERS: ${game.monsters.length} | HEROES: ${game.heroes.length}`, 200, H + 30);
  ctx.fillStyle = '#c9b8e8';
  ctx.fillText(game.message || '地下迷宮を掘り進め、生態系を築け。', 200, H + 55);
}
// ===END:RENDER===

    // --- 起動コード（セクション外・防御的に呼び出す） ---
    window.addEventListener('resize', function () { if (typeof resize === 'function') resize(); });
    if (typeof resize === 'function') resize();
    if (typeof init === 'function') init();
    let __lastTs = 0;
    function __loop(ts) {
      const dt = Math.min(0.05, ((ts - __lastTs) || 16) / 1000);
      __lastTs = ts;
      if (typeof update === 'function') update(dt);
      if (typeof render === 'function') render();
      requestAnimationFrame(__loop);
    }
    requestAnimationFrame(__loop);
  </script>
</body>
</html>
