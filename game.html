<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 15;
    const HUD = 120;
    let TILE = 40;

    let game = {
      round: 1,
      digsLeft: 10,
      phase: 'dig',
      map: [], 
      monsters: [],
      grid: [],
      heroes: [],
      message: '魔王よ、地面を掘り、魔物の揺りかごを作れ'
    };

    function mutate(val, nutrient) {
      const factor = Math.max(0.2, Math.min(1.0, nutrient / 5.0));
      return Math.max(0.1, val * (0.95 + Math.random() * 0.1 * factor));
    }

    function createMonster(x, y, type, parentGenes = null, nutrient = 1.0) {
      const genes = parentGenes ? {
        speed: mutate(parentGenes.speed, nutrient),
        metabolism: mutate(parentGenes.metabolism, nutrient),
        reproThreshold: mutate(parentGenes.reproThreshold, nutrient),
        size: mutate(parentGenes.size || 1.0, nutrient)
      } : {
        speed: 0.5 + Math.random() * 0.5,
        metabolism: 0.8 + Math.random() * 0.4,
        reproThreshold: 80 + Math.random() * 40,
        size: 0.8 + Math.random() * 0.4
      };
      return { x, y, hp: 10, type, energy: 50, lastMoveTime: 0, genes };
    }

    function updateGrid() {
      game.grid = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => []));
      game.monsters.forEach(m => {
        if (m.x >= 0 && m.x < COLS && m.y >= 0 && m.y < ROWS) {
          game.grid[m.x][m.y].push(m);
        }
      });
    }

    function resize() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HUD;
      TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
      canvas.width = COLS * TILE;
      canvas.height = ROWS * TILE + HUD;
    }

    function init() {
      resize();
      game.map = Array.from({ length: COLS }, () => Array(ROWS).fill(0.0));
      game.monsters = [];
      game.heroes = [];
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round - 1) * 2;
      game.message = 'ラウンド ' + game.round + '：ダンジョンを掘り進めよ';
      updateGrid();
    }

    function onDig(e) {
      if (game.phase === 'over') { game.round = 1; init(); return; }
      if (game.phase !== 'dig' || game.digsLeft <= 0) return;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy] > 0) return;
      
      game.map[cx][cy] = 3.0; 
      game.digsLeft--;
      
      if (Math.random() < 0.8) {
        game.monsters.push(createMonster(cx, cy, Math.random() > 0.4 ? 0 : 1));
        updateGrid();
      }

      if (game.digsLeft <= 0) {
        game.phase = 'battle';
        game.message = '勇者が侵攻を開始した！';
        for (let i = 0; i < 2 + game.round; i++) {
          game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 30 + game.round * 10, t: 0 });
        }
      }
    }

    function update(dt) {
      if (game.phase === 'battle') {
        const predators = game.monsters.filter(m => m.type === 1);
        const preys = game.monsters.filter(m => m.type === 0);
        const preyRatio = preys.length > 0 ? predators.length / preys.length : 1.0;

        for (let i = game.monsters.length - 1; i >= 0; i--) {
          let m = game.monsters[i];
          
          let metabolism = (Math.pow(m.genes.speed, 2) * m.genes.size * m.genes.metabolism);
          if (m.type === 1) {
            metabolism *= (1.0 + preyRatio); 
          }
          
          m.energy -= metabolism * dt * 5;
          m.lastMoveTime += dt;

          if (m.type === 1) {
            let preyIndex = game.grid[m.x][m.y].findIndex(other => other.type === 0);
            if (preyIndex !== -1) {
              let prey = game.grid[m.x][m.y][preyIndex];
              m.energy += prey.energy;
              prey.energy = -1; 
            }
          }

          if (m.lastMoveTime > (1.5 - m.genes.speed)) {
            let nx = Math.max(0, Math.min(COLS - 1, m.x + Math.floor(Math.random()*3)-1));
            let ny = Math.max(0, Math.min(ROWS - 1, m.y + Math.floor(Math.random()*3)-1));
            m.x = nx; m.y = ny; m.lastMoveTime = 0;
          }

          if (m.energy > m.genes.reproThreshold && game.map[m.x][m.y] > 0.2) {
            m.energy /= 2;
            game.monsters.push(createMonster(m.x, m.y, m.type, m.genes, game.map[m.x][m.y]));
          }

          if (m.energy <= 0) {
            game.map[m.x][m.y] += 0.5;
            game.monsters.splice(i, 1);
          }
        }

        game.heroes.forEach((h, idx) => {
          h.t += dt;
          if (h.t > 1.5) {
            h.t = 0;
            let target = game.grid[h.x][h.y] ? game.grid[h.x][h.y][0] : null;
            if (target) target.energy -= 30;
            else if (h.x < COLS - 1) h.x++;
          }
          if (h.hp <= 0) game.heroes.splice(idx, 1);
        });

        if (game.monsters.length === 0 && game.heroes.length > 0) { game.phase = 'over'; game.message = '魔物が全滅した... クリックで再挑戦'; }
        else if (game.heroes.length === 0) { game.round++; game.phase = 'dig'; game.digsLeft = 10 + (game.round - 1) * 2; game.message = '防衛成功！次の階層へ'; }
      }
      updateGrid();
    }

    function render() {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          let d = Math.min(1, game.map[x][y] / 3);
          ctx.fillStyle = `rgb(${d*100}, ${d*30}, 10)`;
          ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        }
      }
      game.monsters.forEach(m => {
        ctx.fillStyle = m.type === 1 ? '#ff4444' : '#44aaff';
        ctx.beginPath(); ctx.arc(m.x * TILE + TILE/2, m.y * TILE + TILE/2, TILE/4, 0, Math.PI*2); ctx.fill();
        if (m.type === 1 && m.energy < 20) {
          ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(m.x * TILE + TILE/2, m.y * TILE + TILE/2, TILE/2, 0, Math.PI*2); ctx.stroke();
        }
      });
      game.heroes.forEach(h => { ctx.fillStyle = '#fff'; ctx.fillRect(h.x * TILE + 5, h.y * TILE + 5, TILE - 10, TILE - 10); });
      
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText(`Round: ${game.round} | 掘削: ${game.digsLeft} | 魔物: ${game.monsters.length} | 勇者: ${game.heroes.length}`, 20, ROWS * TILE + 30);
      ctx.fillText(game.message, 20, ROWS * TILE + 60);
      ctx.fillText("生態系: 青(被食者) 赤(捕食者) | 赤枠は飢餓状態", 20, ROWS * TILE + 90);
    }

    let last = 0;
    function loop(ts) { update((ts - last) / 1000); render(); last = ts; requestAnimationFrame(loop); }
    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    init(); requestAnimationFrame(loop);
  </script>
</body>
</html>
