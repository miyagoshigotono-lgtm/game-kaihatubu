<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ===SECTION:CONFIG===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 24;
const ROWS = 18;
const HUD_HEIGHT = 100;
const TILE_SIZE = Math.floor(Math.min(window.innerWidth / COLS, (window.innerHeight - HUD_HEIGHT) / ROWS));

let mouseX = 0;
let mouseY = 0;

const game = {
    map: [],
    monsters: [],
    heroes: [],
    phase: 'MINING',
    player: {
        x: Math.floor(COLS / 2),
        y: 0
    }
};

const TILE_TYPES = {
    WALL: { id: 'wall', hardness: 10, nutrient: 20 },
    GROUND: { id: 'ground', hardness: 0, nutrient: 5 }
};

const FILTERS = { NONE: null, NURSERY: 'NURSERY', SANCTUARY: 'SANCTUARY', RESOURCE: 'RESOURCE' };

function initMap() {
    game.map = new Array(COLS);
    for (let x = 0; x < COLS; x++) {
        game.map[x] = new Array(ROWS);
        for (let y = 0; y < ROWS; y++) {
            const isPlayerStart = (x === game.player.x && y === game.player.y);
            const type = isPlayerStart ? TILE_TYPES.GROUND : TILE_TYPES.WALL;
            
            game.map[x][y] = {
                type: type.id,
                hardness: type.hardness,
                nutrient: isPlayerStart ? 0 : Math.floor(Math.random() * 50) + type.nutrient,
                filter: FILTERS.NONE
            };
        }
    }
}

initMap();
// ===END:CONFIG===

// ===SECTION:STATE===
let game = {
  round: 1,
  digsLeft: 10,
  interferencePoints: 5,
  nutrients: 0,
  phase: 'dig',
  playerX: 10,
  playerY: 0,
  visionRadius: 3,
  map: [],
  monsters: [],
  grid: [],
  heroes: [],
  particles: [],
  eventLog: [],
  message: '魔王よ、地面を掘り、魔物の揺りかごを作れ (WASDキーで移動、隣接マスを採掘)',

  // 入力制御システム
  inputQueue: [],
  isProcessingInput: false,
  lastInputTime: 0,
  inputCooldown: 150, // ミリ秒単位の入力間隔制限

  /**
   * キー入力のバッファリング
   */
  enqueueInput(key) {
    if (this.inputQueue.length < 5) {
      this.inputQueue.push(key);
    }
  },

  /**
   * 掘削履歴を記録し、メッセージを更新する
   */
  log(message) {
    const timestamp = new Date().toLocaleTimeString('ja-JP', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    this.eventLog.unshift(`[${timestamp}] ${message}`);
    if (this.eventLog.length > 50) this.eventLog.pop();
    this.message = message;
  },

  /**
   * 掘削可能判定
   */
  canDig(x, y) {
    const dx = Math.abs(x - this.playerX);
    const dy = Math.abs(y - this.playerY);
    return (dx + dy === 1) && 
           (x >= 0 && x < this.map.length) && 
           (y >= 0 && y < this.map[0].length) &&
           (this.map[x][y].type === 'wall');
  },

  /**
   * 移動可能判定
   */
  canMove(x, y) {
    return (x >= 0 && x < this.map.length) && 
           (y >= 0 && y < this.map[0].length) &&
           (this.map[x][y].type === 'empty');
  }
};

function getAttractiveness(x, y) {
  const cell = game.map[x][y];
  if (!cell || !cell.filter) return 1.0;
  const f = cell.filter;
  if (f === 'NURSERY') return 3.0;
  if (f === 'SANCTUARY') return 2.0;
  if (f === 'RESOURCE') return 2.5;
  return 1.0;
}

function addParticle(x, y, color, life = 1.0) {
  game.particles.push({
    x: x * 32 + 16,
    y: y * 32 + 16,
    vx: (Math.random() - 0.5) * 50,
    vy: (Math.random() - 0.5) * 50,
    life: life,
    color: color
  });
}
// ===END:STATE===

// ===SECTION:ECOSYSTEM===
function mutate(val, nutrient) {
  const factor = Math.max(0.2, Math.min(1.0, nutrient / 5.0));
  return Math.max(0.1, val * (0.95 + Math.random() * 0.1 * factor));
}

function createMonster(x, y, type, parentGenes = null, generation = 1, parentId = 0, nutrient = 1.0) {
  const genes = parentGenes ? {
    speed: mutate(parentGenes.speed, nutrient),
    metabolism: mutate(parentGenes.metabolism, nutrient),
    reproThreshold: mutate(parentGenes.reproThreshold, nutrient),
    size: mutate(parentGenes.size, nutrient),
    appearance: {
      shapeType: parentGenes.appearance.shapeType,
      colorBase: Math.max(0, Math.min(360, parentGenes.appearance.colorBase + (Math.random() * 40 - 20)))
    }
  } : {
    speed: 0.5 + (nutrient * 0.2),
    metabolism: 0.5 + (nutrient * 0.2),
    reproThreshold: 80 + (nutrient * 20),
    size: 0.5 + (nutrient * 0.5),
    appearance: {
      shapeType: type === 1 ? Math.floor(Math.random() * 2) + 2 : Math.floor(Math.random() * 2),
      colorBase: type === 1 ? 0 + Math.random() * 40 : 180 + Math.random() * 60
    }
  };

  const monster = {
    id: ++monsterCounter,
    parentId,
    generation,
    x, y,
    type,
    hp: 20 * genes.size,
    energy: 50 * genes.size,
    genes,
    lastMoveTime: 0,
    isSettled: false
  };

  game.monsters.push(monster);
  return monster;
}

function checkPredation(cellMonsters) {
  const predators = cellMonsters.filter(m => m.type === 1);
  const preys = cellMonsters.filter(m => m.type === 0);

  if (predators.length === 0 || preys.length === 0) return;

  predators.forEach(predator => {
    const target = preys[Math.floor(Math.random() * preys.length)];
    const damage = 5 * predator.genes.size;
    target.hp -= damage;
    predator.energy += damage * 0.5;

    if (target.hp <= 0) {
      game.monsters = game.monsters.filter(m => m.id !== target.id);
    }
  });
}

function updateGrid() {
  game.grid = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => []));

  game.monsters.forEach(m => {
    const gx = Math.floor(m.x);
    const gy = Math.floor(m.y);
    if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
      game.grid[gx][gy].push(m);
    }
  });

  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (game.grid[x][y].length > 1) {
        checkPredation(game.grid[x][y]);
      }
    }
  }
}

function resize() {
  const pixelRatio = window.devicePixelRatio || 1;
  const availW = window.innerWidth;
  const availH = window.innerHeight - 60;
  TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));

  canvas.width = COLS * TILE * pixelRatio;
  canvas.height = (ROWS * TILE) * pixelRatio;
  canvas.style.width = (COLS * TILE) + "px";
  canvas.style.height = (ROWS * TILE) + "px";

  const ctx = canvas.getContext('2d');
  ctx.scale(pixelRatio, pixelRatio);
}
// ===END:ECOSYSTEM===

// ===SECTION:INIT_INPUT===
let playerX = Math.floor(COLS / 2);
let playerY = 0;

function init() {
  resize();
  game.map = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => ({ type: 'wall', filter: null })));
  game.monsters = [];
  game.heroes = [];
  game.particles = [];
  game.phase = 'dig';
  game.digsLeft = 10 + (game.round - 1) * 2;
  game.interferencePoints = 5 + game.round;
  
  // 魔王の初期位置を壁から空き地に変更（スタート地点を確保）
  playerX = Math.floor(COLS / 2);
  playerY = 0;
  game.map[playerX][playerY].type = 'ground';
  
  game.message = `ラウンド ${game.round}：WASD/矢印キーで移動・隣接壁を掘削。残り掘削回数:${game.digsLeft}`;
  updateGrid();
}

function dig(x, y) {
  if (game.phase !== 'dig' || game.digsLeft <= 0) return false;
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS || game.map[x][y].type !== 'wall') return false;

  game.map[x][y].type = 'ground';
  game.digsLeft--;

  // 魔物自動生成ロジック
  const monsterTypes = ['slime', 'bat', 'skeleton'];
  const type = monsterTypes[Math.floor(Math.random() * monsterTypes.length)];
  game.monsters.push(createMonster(x, y, type));

  // 掘削完了判定
  if (game.digsLeft <= 0) {
    game.phase = 'battle';
    game.message = '掘削終了。勇者の侵攻が始まった！';
    for (let i = 0; i < 2 + game.round; i++) {
      game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 30 + game.round * 10, target: null });
    }
  } else {
    game.message = `採掘中... 残り:${game.digsLeft}`;
  }
  updateGrid();
  return true;
}

window.addEventListener('keydown', (e) => {
  if (game.phase === 'over') { game.round = 1; init(); return; }
  if (game.phase !== 'dig') return;

  const moves = {
    'ArrowUp': [0, -1], 'w': [0, -1],
    'ArrowDown': [0, 1], 's': [0, 1],
    'ArrowLeft': [-1, 0], 'a': [-1, 0],
    'ArrowRight': [1, 0], 'd': [1, 0]
  };

  if (!moves[e.key]) return;

  const [dx, dy] = moves[e.key];
  const nx = playerX + dx;
  const ny = playerY + dy;

  if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
    if (game.map[nx][ny].type === 'wall') {
      // 隣接マスが壁なら掘削を試みる
      dig(nx, ny);
    } else {
      // 空き地なら移動する
      playerX = nx;
      playerY = ny;
    }
  }
  updateGrid();
});

function onFilter(e) {
  e.preventDefault();
  if (game.phase !== 'dig') return;
  const rect = canvas.getBoundingClientRect();
  const cx = Math.floor((e.clientX - rect.left) / TILE);
  const cy = Math.floor((e.clientY - rect.top) / TILE);
  
  if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy].type !== 'ground' || game.interferencePoints <= 0) return;

  const filters = [null, 'nursery', 'sanctuary', 'resource'];
  let currentIdx = filters.indexOf(game.map[cx][cy].filter);
  game.map[cx][cy].filter = filters[(currentIdx + 1) % filters.length];
  game.interferencePoints--;
  updateGrid();
}
// ===END:INIT_INPUT===

// ===SECTION:UPDATE===
function dig(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS || game.map[y][x].value === 0 || game.digsLeft <= 0) return false;

  game.map[y][x].value = 0;
  game.digsLeft--;

  const nutrient = game.map[y][x].nutrient;
  if (Math.random() < nutrient * 0.4) {
    const type = Math.random() < 0.4 ? 1 : 0;
    const genes = {
      speed: 0.3 + Math.random() * 0.4,
      size: 0.2 + Math.random() * 0.3,
      reproThreshold: 40 + Math.random() * 60
    };
    game.monsters.push(createMonster(x, y, type, genes, 0, 50 + Math.random() * 50));
    addParticle(x, y, '#ffffff');
  }
  return true;
}

function update(dt) {
  game.particles.forEach((p, i) => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  });

  if (game.phase === 'dig') {
    const moveSpeed = 4.0;
    let nextX = game.player.x;
    let nextY = game.player.y;

    if (keys['w']) nextY -= moveSpeed * dt;
    if (keys['s']) nextY += moveSpeed * dt;
    if (keys['a']) nextX -= moveSpeed * dt;
    if (keys['d']) nextX += moveSpeed * dt;

    nextX = Math.max(0, Math.min(COLS - 1, nextX));
    nextY = Math.max(0, Math.min(ROWS - 1, nextY));

    if (game.map[Math.floor(nextY)][Math.floor(nextX)].value === 0) {
      game.player.x = nextX;
      game.player.y = nextY;
    }

    if (keys[' ']) {
      const dx = [0, 0, 1, -1];
      const dy = [1, -1, 0, 0];
      for(let i=0; i<4; i++){
        dig(Math.floor(game.player.x) + dx[i], Math.floor(game.player.y) + dy[i]);
      }
    }
    
    if (game.digsLeft <= 0 && game.monsters.length > 0) game.phase = 'battle';
  }

  if (game.phase === 'battle') {
    updateGrid();

    for (let i = game.monsters.length - 1; i >= 0; i--) {
      let m = game.monsters[i];
      m.energy -= (m.genes.speed * 0.3 + m.genes.size * 0.1) * dt * 10;

      if (m.type === 1) {
        let targets = game.grid[m.y] && game.grid[m.y][m.x] ? game.grid[m.y][m.x].filter(o => o.type === 0 && o !== m) : [];
        if (targets.length > 0) {
          m.energy += targets[0].energy * 0.8;
          targets[0].energy = -1;
          addParticle(m.x, m.y, '#ff0000');
        }
      }

      m.lastMoveTime += dt;
      if (m.lastMoveTime > (1.5 - m.genes.speed)) {
        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
        const [dx, dy] = dirs[Math.floor(Math.random() * 4)];
        const nx = Math.max(0, Math.min(COLS - 1, Math.floor(m.x) + dx));
        const ny = Math.max(0, Math.min(ROWS - 1, Math.floor(m.y) + dy));
        if (game.map[ny][nx].value === 0) {
          m.x = nx; m.y = ny;
        }
        m.lastMoveTime = 0;
      }

      if (m.energy > m.genes.reproThreshold) {
        m.energy /= 2;
        game.monsters.push(createMonster(m.x, m.y, m.type, {...m.genes}, m.generation + 1, m.energy));
        addParticle(m.x, m.y, '#ffff00');
      }

      if (m.energy <= 0) game.monsters.splice(i, 1);
    }

    game.heroes.forEach((h, idx) => {
      h.timer += dt;
      if (h.timer > 0.8) {
        h.timer = 0;
        let best = {x: h.x, y: h.y, score: -1};
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            let ny = Math.max(0, Math.min(ROWS-1, h.y + dy)), nx = Math.max(0, Math.min(COLS-1, h.x + dx));
            let score = (game.grid[ny][nx] ? game.grid[ny][nx].length : 0) * 20 + Math.random() * 5;
            if (score > best.score) best = {x: nx, y: ny, score: score};
          }
        }
        h.x = best.x; h.y = best.y;
        if (game.grid[h.y][h.x]) game.grid[h.y][h.x].forEach(m => m.energy -= h.atk);
      }
      if (h.hp <= 0) game.heroes.splice(idx, 1);
    });

    if (game.monsters.length === 0 && game.heroes.length > 0) {
      game.phase = 'over';
      game.message = 'ダンジョン生態系が崩壊しました';
    } else if (game.heroes.length === 0) {
      game.round++;
      game.phase = 'dig';
      game.digsLeft = 15 + (game.round * 5);
    }
  }
}
// ===END:UPDATE===

// ===SECTION:RENDER===
function render() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const VISIBILITY_RADIUS = 5;
  const HUD_HEIGHT = 120;
  const mapHeight = canvas.height - HUD_HEIGHT;

  function isVisible(x, y) {
    const dx = x - game.playerX;
    const dy = y - game.playerY;
    return Math.sqrt(dx * dx + dy * dy) <= VISIBILITY_RADIUS;
  }

  // 地形描画
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      const visible = isVisible(x, y);
      const d = Math.min(1, game.map[x][y].value / 3);
      ctx.fillStyle = visible ? `rgb(${d * 30}, ${d * 120 + 20}, ${d * 60})` : '#050505';
      ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);

      // 掘削ガイド：隣接する掘削可能マスに黄色い���線
      const dx = Math.abs(x - game.playerX);
      const dy = Math.abs(y - game.playerY);
      if (game.digsLeft > 0 && ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) && game.map[x][y].value > 0) {
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 2]);
        ctx.strokeRect(x * TILE + 4, y * TILE + 4, TILE - 8, TILE - 8);
        ctx.setLineDash([]);
      }

      if (visible && game.map[x][y].filter) {
        ctx.fillStyle = game.map[x][y].filter === FILTERS.NURSERY ? 'rgba(100,255,100,0.3)' : 'rgba(255,255,100,0.3)';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }

  // 魔王の強調オーラ
  const px = game.playerX * TILE + TILE / 2;
  const py = game.playerY * TILE + TILE / 2;
  const auraGradient = ctx.createRadialGradient(px, py, 5, px, py, TILE * 1.5);
  auraGradient.addColorStop(0, 'rgba(0, 150, 255, 0.4)');
  auraGradient.addColorStop(1, 'rgba(0, 50, 255, 0)');
  ctx.fillStyle = auraGradient;
  ctx.beginPath();
  ctx.arc(px, py, TILE * 1.5, 0, Math.PI * 2);
  ctx.fill();

  // 魔物描画
  game.monsters.forEach(m => {
    if (!isVisible(m.x, m.y)) return;
    const mx = m.x * TILE + TILE / 2;
    const my = m.y * TILE + TILE / 2;
    const size = (TILE / 2.5) * (m.genes.size || 1);
    ctx.fillStyle = `hsl(${m.appearance.colorBase}, 70%, 50%)`;
    ctx.beginPath();
    if (m.appearance.shapeType === 0) {
      ctx.arc(mx, my, size, 0, Math.PI * 2);
    } else if (m.appearance.shapeType === 1) {
      for (let i = 0; i < 4; i++) {
        const angle = (i * Math.PI / 2) + Math.PI / 4;
        const vx = mx + Math.cos(angle) * size * 1.2;
        const vy = my + Math.sin(angle) * size * 1.2;
        i === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
      }
    } else {
      for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? size : size / 1.5;
        const angle = (i * Math.PI / 5) - Math.PI / 2;
        ctx.lineTo(mx + Math.cos(angle) * r, my + Math.sin(angle) * r);
      }
    }
    ctx.closePath();
    ctx.fill();
  });

  // 勇者描画
  game.heroes.forEach(h => {
    if (!isVisible(h.x, h.y)) return;
    ctx.fillStyle = '#ff4444';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff0000';
    ctx.fillRect(h.x * TILE + 4, h.y * TILE + 4, TILE - 8, TILE - 8);
    ctx.shadowBlur = 0;
  });

  // フォグ描画
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!isVisible(x, y)) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }

  // HUD描画
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, mapHeight, canvas.width, HUD_HEIGHT);
  ctx.strokeStyle = '#333';
  ctx.strokeRect(0, mapHeight, canvas.width, HUD_HEIGHT);

  ctx.fillStyle = '#00ffcc';
  ctx.font = 'bold 18px "Courier New"';
  ctx.fillText(`ROUND: ${game.round}`, 30, mapHeight + 40);
  ctx.fillText(`DIGS LEFT: ${game.digsLeft}`, 200, mapHeight + 40);
  ctx.fillText(`INTERFERENCE: ${game.interferencePoints}`, 400, mapHeight + 40);

  ctx.fillStyle = '#cccccc';
  ctx.font = '14px monospace';
  ctx.fillText(`MESSAGE: ${game.message}`, 30, mapHeight + 80);
}
// ===END:RENDER===

    let last = 0;
    function loop(ts) { update((ts - last) / 1000); render(); last = ts; requestAnimationFrame(loop); }
    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    canvas.addEventListener('contextmenu', onFilter);
    init(); requestAnimationFrame(loop);
  </script>
</body>
</html>
