<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ===SECTION:CONFIG===
// 定数・Canvas初期化・グリッド設定・画面リサイズ。ゲーム全体で共有する土台。
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;       // 横マス数
const ROWS = 14;       // 縦マス数
const HUD = 70;        // 画面下部の情報表示エリアの高さ(px)
let TILE = 32;         // 1マスのピクセルサイズ（resizeで決定）
let monsterId = 0;     // 魔物の通し番号

const COLORS = {
  ground:   '#15101f',
  wall:     '#2a1f3d',
  wallEdge: '#3c2c57',
  player:   '#c879ff',
  prey:     '#5bd6a0',
  predator: '#ff6b6b',
  hero:     '#ffd23f',
  hud:      '#181222'
};

function resize() {
  const ratio = window.devicePixelRatio || 1;
  const availW = Math.min(window.innerWidth, 1200);
  const availH = window.innerHeight - HUD - 4;
  TILE = Math.max(14, Math.floor(Math.min(availW / COLS, availH / ROWS)));
  canvas.width = COLS * TILE * ratio;
  canvas.height = (ROWS * TILE + HUD) * ratio;
  canvas.style.width = (COLS * TILE) + 'px';
  canvas.style.height = (ROWS * TILE + HUD) + 'px';
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}
// ===END:CONFIG===

// ===SECTION:STATE===
const game = {
  stage: 1,
  round: 1,
  phase: 'dig',
  digsLeft: 15 + (5 * 1), // ステージに応じて増加
  combo: 0,
  maxCombo: 0,
  player: { 
    x: Math.floor(COLS / 2), 
    y: 2 // 地上入り口(2行目)からスタート
  },
  map: [],
  monsters: [],
  heroes: [],
  particles: [],
  message: 'ダンジョンを掘り進め！'
};

function inBounds(x, y) {
  return x >= 0 && x < COLS && y >= 0 && y < ROWS;
}

function isGround(x, y) {
  return inBounds(x, y) && game.map[x] && game.map[x][y] && !game.map[x][y].wall;
}

function isWall(x, y) {
  return inBounds(x, y) && game.map[x] && game.map[x][y] && game.map[x][y].wall;
}

function addParticle(x, y, color) {
  game.particles.push({
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,
    vx: (Math.random() - 0.5) * 100,
    vy: (Math.random() - 0.5) * 100,
    life: 1.0,
    decay: 0.05 + Math.random() * 0.05,
    color: color
  });
}

function resetCombo() {
  game.combo = 0;
}

function incrementCombo() {
  game.combo++;
  if (game.combo > game.maxCombo) {
    game.maxCombo = game.combo;
  }
}
// ===END:STATE===

// ===SECTION:ECOSYSTEM===
const SPECIES = {
  PREY_A: { id: 0, name: 'スライム', speed: 0.6, energyMax: 40, color: '#a8e063', hp: 5, repro: 60 },
  PREY_B: { id: 1, name: 'ラビット', speed: 0.3, energyMax: 30, color: '#f5d3e0', hp: 3, repro: 40 },
  PRED_A: { id: 2, name: 'スパイダー', speed: 0.5, energyMax: 60, color: '#8e44ad', hp: 12, repro: 90 },
  PRED_B: { id: 3, name: 'ウルフ', speed: 0.2, energyMax: 80, color: '#d35400', hp: 20, repro: 120 }
};

function createMonster(x, y, speciesId) {
  const s = Object.values(SPECIES)[speciesId];
  return { 
    id: ++monsterId, x, y, 
    speciesId, 
    hp: s.hp, 
    energy: s.energyMax * 0.8, 
    cooldown: Math.random() * s.speed,
    speed: s.speed,
    isPredator: speciesId >= 2
  };
}

function spawnMonster(x, y) {
  const speciesId = Math.random() < 0.6 ? (Math.random() < 0.5 ? 0 : 1) : (Math.random() < 0.5 ? 2 : 3);
  game.monsters.push(createMonster(x, y, speciesId));
}

function updateEcosystem(dt) {
  for (let i = game.monsters.length - 1; i >= 0; i--) {
    const m = game.monsters[i];
    const s = Object.values(SPECIES)[m.speciesId];
    m.energy -= dt * 2;
    m.cooldown -= dt;

    if (m.cooldown <= 0) {
      const opts = groundNeighbors(m.x, m.y);
      if (opts.length) { 
        const p = opts[(Math.random() * opts.length) | 0]; 
        m.x = p[0]; m.y = p[1]; 
      }
      m.cooldown = s.speed + Math.random() * 0.2;

      if (m.isPredator) {
        const prey = game.monsters.find(o => !o.isPredator && o.x === m.x && o.y === m.y);
        if (prey) { prey.hp -= 10; m.energy += 25; addParticle(m.x, m.y, '#ff0000'); }
      }

      const nh = nearestHero(m.x, m.y);
      if (nh.hero && nh.dist <= 1) { nh.hero.hp -= (m.isPredator ? 3 : 1); }

      if (m.energy > s.repro) {
        m.energy -= (s.repro / 2);
        game.monsters.push(createMonster(m.x, m.y, m.speciesId));
        addParticle(m.x, m.y, s.color);
      }
    }
    if (m.energy <= 0 || m.hp <= 0) game.monsters.splice(i, 1);
  }
}

function spawnHeroes(n) {
  const entryY = (ROWS / 2) | 0;
  for (let i = 0; i < n; i++) {
    game.heroes.push({ x: 0, y: entryY, hp: 20 + game.round * 10, atk: 5, cooldown: 0 });
  }
}

function updateHeroes(dt) {
  for (let i = game.heroes.length - 1; i >= 0; i--) {
    const h = game.heroes[i];
    h.cooldown -= dt;
    if (h.cooldown <= 0) {
      let target = null, bestD = Infinity;
      for (const m of game.monsters) {
        const d = Math.abs(m.x - h.x) + Math.abs(m.y - h.y);
        if (d < bestD) { bestD = d; target = m; }
      }
      if (target) {
        const dx = Math.sign(target.x - h.x), dy = Math.sign(target.y - h.y);
        if (isGround(h.x + dx, h.y)) h.x += dx;
        else if (isGround(h.x, h.y + dy)) h.y += dy;
        
        if (Math.abs(target.x - h.x) + Math.abs(target.y - h.y) <= 1) {
          target.hp -= h.atk;
          if (target.hp <= 0) game.monsters = game.monsters.filter(o => o.id !== target.id);
        }
      }
      h.cooldown = 0.8;
    }
    if (h.hp <= 0) game.heroes.splice(i, 1);
  }
}

function groundNeighbors(x, y) {
  return [[1,0],[-1,0],[0,1],[0,-1]].map(([dx, dy]) => [x+dx, y+dy]).filter(([nx, ny]) => isGround(nx, ny));
}

function nearestHero(x, y) {
  let best = null, bestD = Infinity;
  for (const h of game.heroes) {
    const d = Math.abs(h.x - x) + Math.abs(h.y - y);
    if (d < bestD) { bestD = d; best = h; }
  }
  return { hero: best, dist: bestD };
}
// ===END:ECOSYSTEM===

// ===SECTION:INIT_INPUT===
// ラウンド初期化と、魔王の操作（移動＝隣接壁の採掘）。
function init() {
  if (!game.round || game.round < 1) game.round = 1;
  game.phase = 'dig';
  game.digsLeft = 10 + (game.round - 1) * 2;
  
  // 地上レイアウト：上部2行は空、入り口は中央上部
  const startX = Math.floor(COLS / 2);
  const startY = 2; 
  game.player = { x: startX, y: startY };
  game.monsters = [];
  game.heroes = [];
  game.particles = [];
  game.cameraOffset = { x: 0, y: 0 }; // 画面揺れ用

  game.map = [];
  for (let x = 0; x < COLS; x++) {
    game.map[x] = [];
    for (let y = 0; y < ROWS; y++) {
      // 上部2行は空（壁なし）、それ以外は壁
      game.map[x][y] = { wall: y >= 2 };
    }
  }
  
  game.message = 'ラウン���' + game.round + '：WASDで採掘。魔王を導き迷宮を広げよ（残り ' + game.digsLeft + '）';
}

function startBattle() {
  game.phase = 'battle';
  spawnHeroes(2 + game.round);
  game.message = '勇者が侵攻を開始した！';
}

function applyScreenShake() {
  // 画面を軽く揺らすエフェクト
  game.cameraOffset = { x: (Math.random() - 0.5) * 10, y: (Math.random() - 0.5) * 10 };
  setTimeout(() => { game.cameraOffset = { x: 0, y: 0 }; }, 100);
}

function tryMove(dx, dy) {
  if (game.phase === 'over' || game.phase === 'win') { 
    if (game.phase === 'over') game.round = 1; 
    init(); return; 
  }
  
  const nx = game.player.x + dx, ny = game.player.y + dy;
  if (!inBounds(nx, ny)) return;
  const cell = game.map[nx][ny];

  if (cell.wall) {
    if (game.phase !== 'dig' || game.digsLeft <= 0) return;
    
    // 採掘実行
    cell.wall = false;
    game.digsLeft--;
    
    // 演出：画面揺れとパーティクル
    applyScreenShake();
    addParticle(nx, ny, '#c879ff');
    
    if (Math.random() < 0.75) spawnMonster(nx, ny);
    game.player.x = nx; game.player.y = ny;
    
    if (game.digsLeft <= 0) {
      startBattle();
    } else {
      game.message = 'ガリッ... 採掘中... 残り ' + game.digsLeft;
    }
  } else {
    // 移動のみ
    game.player.x = nx; game.player.y = ny;
  }
}

function onKey(e) {
  const k = (e.key || '').toLowerCase();
  const moves = {
    'arrowup': [0, -1], 'w': [0, -1],
    'arrowdown': [0, 1], 's': [0, 1],
    'arrowleft': [-1, 0], 'a': [-1, 0],
    'arrowright': [1, 0], 'd': [1, 0]
  };
  if (moves[k]) { 
    e.preventDefault(); 
    tryMove(moves[k][0], moves[k][1]); 
  }
}
window.addEventListener('keydown', onKey);
// ===END:INIT_INPUT===

// ===SECTION:UPDATE===
// 毎フレームの状態更新。パーティクル・生態系・勇者・勝敗判定。
function update(dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.5;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  if (game.phase === 'dig') {
    updateEcosystem(dt);   // 採掘中も魔物は少しずつ生きる
  } else if (game.phase === 'battle') {
    updateEcosystem(dt);
    updateHeroes(dt);
    if (game.heroes.length === 0) {
      game.phase = 'win';
      game.round++;
      game.message = '防衛成功！ ラウンド' + game.round + 'へ（WASDで再開）';
    } else if (game.monsters.length === 0) {
      game.phase = 'over';
      game.message = '魔物が全滅した… 敗北（WASDで再挑戦）';
    }
  }
}
// ===END:UPDATE===

// ===SECTION:RENDER===
function render() {
  const W = COLS * TILE, H = ROWS * TILE;
  const skyHeight = TILE * 2;

  // 背景描画
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, W, skyHeight);
  ctx.fillStyle = '#2d1b0e'; // 地下深部の重厚な土色
  ctx.fillRect(0, skyHeight, W, H - skyHeight);

  // 地形
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      const c = game.map[x] && game.map[x][y];
      if (!c) continue;
      
      const screenX = x * TILE;
      const screenY = y * TILE;

      if (c.wall) {
        // 壁：岩石の質感
        ctx.fillStyle = '#4a3728';
        ctx.fillRect(screenX, screenY, TILE, TILE);
        // 凹凸感
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(screenX + 2, screenY + 2, TILE - 4, TILE - 4);
        ctx.fillStyle = '#5d4736';
        ctx.fillRect(screenX + 4, screenY + 4, TILE - 8, TILE - 8);
      } else {
        // 地面：掘削跡
        ctx.fillStyle = '#261a10';
        ctx.fillRect(screenX, screenY, TILE, TILE);
        // 掘削の跡（テクスチャ的なノイズ）
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(screenX + 1, screenY + 1, TILE - 2, TILE - 2);
      }
    }
  }

  // 採掘可能方向のハイライト
  if (game.phase === 'dig' && game.digsLeft > 0) {
    const p = game.player;
    const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
    const pulse = Math.abs(Math.sin(Date.now() / 300));
    
    ctx.lineWidth = 4;
    ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 + pulse * 0.4})`;
    
    for (const [dx, dy] of dirs) {
      const tx = p.x + dx, ty = p.y + dy;
      if (isWall(tx, ty)) {
        const x = tx * TILE, y = ty * TILE;
        ctx.strokeRect(x + 6, y + 6, TILE - 12, TILE - 12);
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⛏', x + TILE / 2, y + TILE / 2 + 8);
        ctx.textAlign = 'start';
      }
    }
  }

  // 魔物
  for (const m of game.monsters) {
    const cx = m.x * TILE + TILE / 2, cy = m.y * TILE + TILE / 2;
    ctx.fillStyle = m.type === 1 ? '#ff4d4d' : '#4dff88';
    ctx.shadowBlur = 10;
    ctx.shadowColor = m.type === 1 ? 'red' : 'green';
    ctx.beginPath();
    if (m.type === 1) {
      ctx.moveTo(cx, cy - TILE * 0.3);
      ctx.lineTo(cx + TILE * 0.3, cy + TILE * 0.3);
      ctx.lineTo(cx - TILE * 0.3, cy + TILE * 0.3);
    } else {
      ctx.arc(cx, cy, TILE * 0.25, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 勇者
  for (const h of game.heroes) {
    ctx.fillStyle = '#f0e68c';
    ctx.fillRect(h.x * TILE + 4, h.y * TILE + 4, TILE - 8, TILE - 8);
    ctx.strokeStyle = '#daa520';
    ctx.strokeRect(h.x * TILE + 4, h.y * TILE + 4, TILE - 8, TILE - 8);
  }

  // 魔王
  const px = game.player.x * TILE, py = game.player.y * TILE;
  const pulse = (Math.sin(Date.now() / 150) + 1) / 2;
  ctx.save();
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 15 + pulse * 10;
  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.arc(px + TILE / 2, py + TILE / 2, TILE * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // パーティクル（掘削エフェクト）
  for (const p of game.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(0, H, W, HUD);
  ctx.strokeStyle = '#444';
  ctx.strokeRect(0, H, W, HUD);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(`ROUND: ${game.round} | 掘削回数: ${game.digsLeft}`, 20, H + 35);
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText(`魔物: ${game.monsters.length}  勇者: ${game.heroes.length}`, 20, H + 60);
}
// ===END:RENDER===

    // --- 起動コード（セクション外・防御的に呼び出す） ---
    window.addEventListener('resize', function () { if (typeof resize === 'function') resize(); });
    if (typeof resize === 'function') resize();
    if (typeof init === 'function') init();
    let __lastTs = 0;
    function __loop(ts) {
      const dt = Math.min(0.05, ((ts - __lastTs) || 16) / 1000);
      __lastTs = ts;
      if (typeof update === 'function') update(dt);
      if (typeof render === 'function') render();
      requestAnimationFrame(__loop);
    }
    requestAnimationFrame(__loop);
  </script>
</body>
</html>
