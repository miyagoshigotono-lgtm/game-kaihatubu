<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 15;
    const HUD = 120;
    const K = 0.5; // 適正収容係数
    const BASE_RATE = 5.0;
    let TILE = 40;

    let game = {
      round: 1,
      digsLeft: 10,
      phase: 'dig',
      map: [], 
      monsters: [],
      heroes: [],
      message: '魔王よ、地面を掘り、魔物の揺りかごを作れ'
    };

    function resize() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HUD;
      TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
      canvas.width = COLS * TILE;
      canvas.height = ROWS * TILE + HUD;
    }

    function init() {
      resize();
      game.map = Array.from({ length: COLS }, () => Array(ROWS).fill(0.0));
      game.monsters = [];
      game.heroes = [];
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round - 1) * 2;
      game.message = 'ラウンド ' + game.round + '：ダンジョンを掘り進めよ';
    }

    function onDig(e) {
      if (game.phase === 'over') { game.round = 1; init(); return; }
      if (game.phase !== 'dig' || game.digsLeft <= 0) return;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy] > 0) return;
      
      game.map[cx][cy] = 0.8; 
      game.digsLeft--;
      
      if (Math.random() < 0.6) {
        game.monsters.push({ x: cx, y: cy, hp: 10, type: Math.random() > 0.4 ? 0 : 1, hunger: 100 });
      }

      if (game.digsLeft <= 0) {
        game.phase = 'battle';
        game.message = '勇者が侵攻を開始した！';
        for (let i = 0; i < 2 + game.round; i++) {
          game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 20 + game.round * 5, t: 0 });
        }
      }
    }

    function update(dt) {
      if (game.phase === 'battle') {
        let totalMetabolicRate = 0;
        let totalNutrition = 0;

        for(let x=0; x<COLS; x++) {
          for(let y=0; y<ROWS; y++) {
            if (game.map[x][y] > 0) game.map[x][y] = Math.max(0, game.map[x][y] - 0.01 * dt);
            totalNutrition += game.map[x][y];
          }
        }

        const densityMap = Array.from({ length: COLS }, () => Array(ROWS).fill(0));
        game.monsters.forEach(m => densityMap[m.x][m.y]++);

        for (let i = game.monsters.length - 1; i >= 0; i--) {
          let m = game.monsters[i];
          let d = game.map[m.x][m.y];
          let density = densityMap[m.x][m.y];
          
          let metabolicRate = BASE_RATE * (1.0 / (d + 0.1)) * (1.0 + Math.pow(density / (d * K + 0.1), 2));
          if (d > 0.5) metabolicRate *= 0.7;
          
          totalMetabolicRate += metabolicRate;
          m.hunger -= metabolicRate * dt;
          
          if (m.type === 1) {
            game.monsters.forEach(target => {
              if (target.type === 0 && target.x === m.x && target.y === m.y) {
                m.hunger += 50; target.hp = -1;
              }
            });
          }

          if (m.hunger >= 150 && d > 0.2) {
            m.hunger -= 70;
            game.monsters.push({ x: m.x, y: m.y, hp: 10, type: m.type, hunger: 50 });
          }

          if (Math.random() < 0.1 * dt) {
            m.x = Math.max(0, Math.min(COLS - 1, m.x + (Math.random() > 0.5 ? 1 : -1)));
            m.y = Math.max(0, Math.min(ROWS - 1, m.y + (Math.random() > 0.5 ? 1 : -1)));
          }

          if (m.hunger <= 0 || m.hp <= 0) {
            game.map[m.x][m.y] = Math.min(1.0, game.map[m.x][m.y] + 0.2);
            game.monsters.splice(i, 1);
          }
        }

        if (game.monsters.length > 0) {
            console.log(`${game.monsters.length},${(totalMetabolicRate/game.monsters.length).toFixed(2)},${(totalNutrition/(COLS*ROWS)).toFixed(4)}`);
        }

        game.heroes.forEach((h, idx) => {
          h.t += dt;
          if (h.t > 1.0) {
            h.t = 0;
            let target = game.monsters.find(m => m.x === h.x && m.y === h.y);
            if (target) target.hp -= 5;
            else if (h.x < COLS - 1) h.x++;
          }
          if (h.hp <= 0) game.heroes.splice(idx, 1);
        });

        if (game.monsters.length === 0) { game.phase = 'over'; game.message = '敗北... クリックで再挑戦'; }
        else if (game.heroes.length === 0) { game.round++; game.phase = 'dig'; game.digsLeft = 10 + (game.round - 1) * 2; game.message = '防衛成功！次の階層へ'; }
      }
    }

    function render() {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          let d = game.map[x][y];
          ctx.fillStyle = `rgb(${d*150}, 0, 0)`;
          ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        }
      }
      game.monsters.forEach(m => {
        ctx.fillStyle = m.type === 1 ? '#ff4444' : '#4488ff';
        ctx.beginPath(); ctx.arc(m.x * TILE + TILE/2, m.y * TILE + TILE/2, TILE/4, 0, Math.PI*2); ctx.fill();
      });
      game.heroes.forEach(h => { ctx.fillStyle = '#fff'; ctx.fillRect(h.x * TILE + 5, h.y * TILE + 5, TILE - 10, TILE - 10); });
      
      ctx.fillStyle = '#fff';
      ctx.font = '16px monospace';
      ctx.fillText(`Round: ${game.round} | 掘削: ${game.digsLeft} | 魔物: ${game.monsters.length} | 勇者: ${game.heroes.length}`, 20, ROWS * TILE + 40);
      ctx.fillText(game.message, 20, ROWS * TILE + 70);
      ctx.fillText("赤色: 栄養密度 (濃いほど環境収容力が高い)", 20, ROWS * TILE + 100);
    }

    let last = 0;
    function loop(ts) { update((ts - last) / 1000); render(); last = ts; requestAnimationFrame(loop); }
    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    init(); requestAnimationFrame(loop);
  </script>
</body>
</html>
