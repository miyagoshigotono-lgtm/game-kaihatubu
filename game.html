<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 15;
    const HUD = 100;
    let TILE = 40;

    let game = {
      round: 1,
      digsLeft: 10,
      phase: 'dig',
      map: [], // 0:壁, 1:通路
      monsters: [],
      heroes: [],
      message: '魔王よ、地面を掘り、魔物の揺りかごを作れ'
    };

    function resize() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HUD;
      TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
      canvas.width = COLS * TILE;
      canvas.height = ROWS * TILE + HUD;
    }

    function init() {
      resize();
      game.map = Array.from({ length: COLS }, () => Array(ROWS).fill(0));
      game.monsters = [];
      game.heroes = [];
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round - 1) * 2;
      game.message = 'ラウンド ' + game.round + '：掘り進めよ';
    }

    function onDig(e) {
      if (game.phase === 'over') { game.round = 1; init(); return; }
      if (game.phase !== 'dig' || game.digsLeft <= 0) return;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy] === 1) return;
      
      game.map[cx][cy] = 1;
      game.digsLeft--;
      
      // 魂3：土を掘ると���環境」が整い、魔物が自然発生する
      if (Math.random() < 0.6) {
        game.monsters.push({ x: cx, y: cy, hp: 5, energy: 100, type: 'predator' });
      }

      if (game.digsLeft <= 0) {
        game.phase = 'battle';
        game.message = '勇者が侵攻を開始した！';
        for (let i = 0; i < game.round; i++) {
          game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 10, t: 0 });
        }
      }
    }

    function update(dt) {
      if (game.phase !== 'battle') return;

      // 魔物の自律行動（徘徊と捕食）
      for (let m of game.monsters) {
        if (Math.random() < 0.05) {
          const nx = m.x + (Math.random() > 0.5 ? 1 : -1);
          const ny = m.y + (Math.random() > 0.5 ? 1 : -1);
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[nx][ny] === 1) {
            m.x = nx; m.y = ny;
          }
        }
      }

      // 勇者のAI（通路のみ移動）
      for (let h of game.heroes) {
        h.t += dt;
        if (h.t > 0.8) {
          h.t = 0;
          let target = game.monsters[Math.floor(Math.random() * game.monsters.length)];
          if (target) {
            if (target.x > h.x && game.map[h.x + 1][h.y]) h.x++;
            else if (target.x < h.x && game.map[h.x - 1][h.y]) h.x--;
            else if (target.y > h.y && game.map[h.x][h.y + 1]) h.y++;
            else if (target.y < h.y && game.map[h.x][h.y - 1]) h.y--;
            
            if (h.x === target.x && h.y === target.y) {
              target.hp -= 2;
              if (target.hp <= 0) game.monsters = game.monsters.filter(m => m !== target);
            }
          }
        }
      }

      if (game.monsters.length === 0) {
        game.phase = 'over';
        game.message = '魔物が全滅した... 敗北。クリックで再挑戦';
      } else if (game.heroes.length === 0) {
        game.round++;
        game.phase = 'dig';
        game.digsLeft = 10 + (game.round - 1) * 2;
        game.message = '勇者を撃退した。ラウンド ' + game.round + ' へ';
      }
    }

    function render() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillStyle = game.map[x][y] === 1 ? '#1a1a2e' : '#050505';
          ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        }
      }
      for (let m of game.monsters) {
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(m.x * TILE + 5, m.y * TILE + 5, TILE - 10, TILE - 10);
      }
      for (let h of game.heroes) {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(h.x * TILE + TILE/2, h.y * TILE + TILE/2, TILE/3, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#fff';
      ctx.font = '20px monospace';
      ctx.fillText(`Round: ${game.round} | 掘削: ${game.digsLeft} | 魔物: ${game.monsters.length}`, 20, ROWS * TILE + 40);
      ctx.fillText(game.message, 20, ROWS * TILE + 75);
    }

    let last = 0;
    function loop(ts) {
      update((ts - last) / 1000);
      render();
      last = ts;
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
