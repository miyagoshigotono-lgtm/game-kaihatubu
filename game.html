<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ===SECTION:CONFIG===
// 定数・Canvas初期化・グリッド設定・画面リサイズ。ゲーム全体で共有する土台。
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;       // 横マス数
const ROWS = 14;       // 縦マス数
const HUD = 70;        // 画面下部の情報表示エリアの高さ(px)
let TILE = 32;         // 1マスのピクセルサイズ（resizeで決定）
let monsterId = 0;     // 魔物の通し番号

const COLORS = {
  ground:   '#15101f',
  wall:     '#2a1f3d',
  wallEdge: '#3c2c57',
  player:   '#c879ff',
  prey:     '#5bd6a0',
  predator: '#ff6b6b',
  hero:     '#ffd23f',
  hud:      '#181222'
};

function resize() {
  const ratio = window.devicePixelRatio || 1;
  const availW = Math.min(window.innerWidth, 1200);
  const availH = window.innerHeight - HUD - 4;
  TILE = Math.max(14, Math.floor(Math.min(availW / COLS, availH / ROWS)));
  canvas.width = COLS * TILE * ratio;
  canvas.height = (ROWS * TILE + HUD) * ratio;
  canvas.style.width = (COLS * TILE) + 'px';
  canvas.style.height = (ROWS * TILE + HUD) + 'px';
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}
// ===END:CONFIG===

// ===SECTION:STATE===
const game = {
  stage: 1,
  round: 1,
  phase: 'dig',
  digsLeft: 15 + (5 * 1), // ステージに応じて増加
  combo: 0,
  maxCombo: 0,
  player: { 
    x: Math.floor(COLS / 2), 
    y: 2 // 地上入り口(2行目)からスタート
  },
  map: [],
  monsters: [],
  heroes: [],
  particles: [],
  message: 'ダンジョンを掘り進め！'
};

function inBounds(x, y) {
  return x >= 0 && x < COLS && y >= 0 && y < ROWS;
}

function isGround(x, y) {
  return inBounds(x, y) && game.map[x] && game.map[x][y] && !game.map[x][y].wall;
}

function isWall(x, y) {
  return inBounds(x, y) && game.map[x] && game.map[x][y] && game.map[x][y].wall;
}

function addParticle(x, y, color) {
  game.particles.push({
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,
    vx: (Math.random() - 0.5) * 100,
    vy: (Math.random() - 0.5) * 100,
    life: 1.0,
    decay: 0.05 + Math.random() * 0.05,
    color: color
  });
}

function resetCombo() {
  game.combo = 0;
}

function incrementCombo() {
  game.combo++;
  if (game.combo > game.maxCombo) {
    game.maxCombo = game.combo;
  }
}
// ===END:STATE===

// ===SECTION:ECOSYSTEM===
const SPECIES = {
  PREY_A: { id: 0, name: 'スライム', speed: 1, energyMax: 40, color: '#a8e063', hp: 5, repro: 60, size: 0.3, atk: 1 },
  PREY_B: { id: 1, name: 'ラビット', speed: 1.5, energyMax: 30, color: '#f5d3e0', hp: 3, repro: 40, size: 0.4, atk: 0.5 },
  PRED_A: { id: 2, name: 'スパイダー', speed: 0.8, energyMax: 60, color: '#8e44ad', hp: 12, repro: 90, size: 0.5, atk: 3 },
  PRED_B: { id: 3, name: 'ウルフ', speed: 1.2, energyMax: 80, color: '#d35400', hp: 20, repro: 120, size: 0.6, atk: 4 }
};

const HERO_CLASSES = {
  WARRIOR: { name: '戦士', hp: 30, atk: 5, speed: 1, color: '#e74c3c' },
  MAGE: { name: '魔法使い', hp: 15, atk: 8, speed: 0.5, color: '#3498db' }
};

if (typeof window.monsterId === 'undefined') window.monsterId = 0;

function createMonster(x, y, speciesId) {
  const s = Object.values(SPECIES)[speciesId];
  return { 
    id: ++window.monsterId, x, y, 
    speciesId, hp: s.hp, energy: s.energyMax * 0.7, 
    energyMax: s.energyMax, isPredator: speciesId >= 2,
    state: 'idle'
  };
}

function spawnMonster(x, y) {
  const speciesId = Math.random() < 0.6 ? (Math.random() < 0.5 ? 0 : 1) : (Math.random() < 0.5 ? 2 : 3);
  game.monsters.push(createMonster(x, y, speciesId));
}

function updateEcosystem() {
  for (let i = game.monsters.length - 1; i >= 0; i--) {
    const m = game.monsters[i];
    const s = Object.values(SPECIES)[m.speciesId];
    
    m.energy -= 1;
    if (m.energy < s.energyMax * 0.3) m.state = 'hungry';
    else if (m.energy > s.repro) m.state = 'reproducing';
    else m.state = 'idle';

    const opts = groundNeighbors(m.x, m.y);
    if (opts.length > 0 && Math.random() < (m.state === 'hungry' ? 0.9 : 0.4) * s.speed) {
      const p = opts[(Math.random() * opts.length) | 0]; 
      m.x = p[0]; m.y = p[1]; 
    }

    if (m.isPredator) {
      const prey = game.monsters.find(o => !o.isPredator && o.x === m.x && o.y === m.y);
      if (prey) { 
        prey.hp -= s.atk; 
        m.energy += 30; 
      }
    }

    const nh = nearestHero(m.x, m.y);
    if (nh.hero && nh.dist === 0) { nh.hero.hp -= s.atk; }

    if (m.state === 'reproducing' && opts.length > 0) {
      m.energy -= (s.repro / 2);
      const spawnPos = opts[(Math.random() * opts.length) | 0];
      game.monsters.push(createMonster(spawnPos[0], spawnPos[1], m.speciesId));
    }

    if (m.energy <= 0 || m.hp <= 0) game.monsters.splice(i, 1);
  }
}

function spawnHeroes(n) {
  for (let i = 0; i < n; i++) {
    const type = Math.random() < 0.7 ? HERO_CLASSES.WARRIOR : HERO_CLASSES.MAGE;
    game.heroes.push({ 
      x: 0, y: (ROWS / 2) | 0, 
      hp: type.hp + (game.stage * 5), 
      atk: type.atk, 
      class: type,
      moveTimer: 0 
    });
  }
}

function updateHeroes() {
  for (let i = game.heroes.length - 1; i >= 0; i--) {
    const h = game.heroes[i];
    h.moveTimer += h.class.speed;
    
    if (h.moveTimer >= 1) {
      h.moveTimer = 0;
      let target = null, bestD = Infinity;
      game.monsters.forEach(m => {
        const d = Math.abs(m.x - h.x) + Math.abs(m.y - h.y);
        if (d < bestD) { bestD = d; target = m; }
      });

      if (target) {
        if (bestD > 0) {
          const dx = Math.sign(target.x - h.x), dy = Math.sign(target.y - h.y);
          if (isGround(h.x + dx, h.y)) h.x += dx;
          else if (isGround(h.x, h.y + dy)) h.y += dy;
        } else {
          target.hp -= h.atk;
        }
      }
    }
    if (h.hp <= 0) game.heroes.splice(i, 1);
  }
}

function groundNeighbors(x, y) {
  return [[1,0],[-1,0],[0,1],[0,-1]].map(([dx, dy]) => [x+dx, y+dy]).filter(([nx, ny]) => isGround(nx, ny));
}

function nearestHero(x, y) {
  let best = null, bestD = Infinity;
  game.heroes.forEach(h => {
    const d = Math.abs(h.x - x) + Math.abs(h.y - y);
    if (d < bestD) { bestD = d; best = h; }
  });
  return { hero: best, dist: bestD };
}
// ===END:ECOSYSTEM===

// ===SECTION:INIT_INPUT===
// ラウンド初期化と、魔王の操作（移動＝隣接壁の採掘）。
function init() {
  if (!game.round || game.round < 1) game.round = 1;
  game.phase = 'dig';
  game.digsLeft = 10 + (game.round - 1) * 2;
  
  // 地上レイアウト：上部2行は空、入り口は中央上部
  const startX = Math.floor(COLS / 2);
  const startY = 2; 
  game.player = { x: startX, y: startY };
  game.monsters = [];
  game.heroes = [];
  game.particles = [];
  game.cameraOffset = { x: 0, y: 0 }; // 画面揺れ用

  game.map = [];
  for (let x = 0; x < COLS; x++) {
    game.map[x] = [];
    for (let y = 0; y < ROWS; y++) {
      // 上部2行は空（壁なし）、それ以外は壁
      game.map[x][y] = { wall: y >= 2 };
    }
  }
  
  game.message = 'ラウン���' + game.round + '：WASDで採掘。魔王を導き迷宮を広げよ（残り ' + game.digsLeft + '）';
}

function startBattle() {
  game.phase = 'battle';
  spawnHeroes(2 + game.round);
  game.message = '勇者が侵攻を開始した！';
}

function applyScreenShake() {
  // 画面を軽く揺らすエフェクト
  game.cameraOffset = { x: (Math.random() - 0.5) * 10, y: (Math.random() - 0.5) * 10 };
  setTimeout(() => { game.cameraOffset = { x: 0, y: 0 }; }, 100);
}

function tryMove(dx, dy) {
  if (game.phase === 'over' || game.phase === 'win') { 
    if (game.phase === 'over') game.round = 1; 
    init(); return; 
  }
  
  const nx = game.player.x + dx, ny = game.player.y + dy;
  if (!inBounds(nx, ny)) return;
  const cell = game.map[nx][ny];

  if (cell.wall) {
    if (game.phase !== 'dig' || game.digsLeft <= 0) return;
    
    // 採掘実行
    cell.wall = false;
    game.digsLeft--;
    
    // 演出：画面揺れとパーティクル
    applyScreenShake();
    addParticle(nx, ny, '#c879ff');
    
    if (Math.random() < 0.75) spawnMonster(nx, ny);
    game.player.x = nx; game.player.y = ny;
    
    if (game.digsLeft <= 0) {
      startBattle();
    } else {
      game.message = 'ガリッ... 採掘中... 残り ' + game.digsLeft;
    }
  } else {
    // 移動のみ
    game.player.x = nx; game.player.y = ny;
  }
}

function onKey(e) {
  const k = (e.key || '').toLowerCase();
  const moves = {
    'arrowup': [0, -1], 'w': [0, -1],
    'arrowdown': [0, 1], 's': [0, 1],
    'arrowleft': [-1, 0], 'a': [-1, 0],
    'arrowright': [1, 0], 'd': [1, 0]
  };
  if (moves[k]) { 
    e.preventDefault(); 
    tryMove(moves[k][0], moves[k][1]); 
  }
}
window.addEventListener('keydown', onKey);
// ===END:INIT_INPUT===

// ===SECTION:UPDATE===
function update(dt) {
  // パーティクルの更新
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 1.5;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  // ステージレベルに応じた勇者侵攻ロジックの強化
  // 魔物の数や種類（生態系の強さ）を勇者が感知するAI補正
  const updateHeroStrategy = () => {
    const totalMonsterPower = game.monsters.reduce((acc, m) => acc + m.power, 0);
    game.heroes.forEach(h => {
      // 魔物が多いほど勇者は慎重に（または集団で）攻める補正
      h.aggression = 1.0 + (game.round * 0.2) + (totalMonsterPower > 50 ? 0.5 : 0);
      h.target = game.monsters.length > 0 ? game.monsters[0] : null;
    });
  };

  if (game.phase === 'dig') {
    // 採掘フェイズ：魔王の移動に合わせて魔物も1歩動く仕様を反映
    // 生態系更新は updateEcosystem に集約
    updateEcosystem(); 
  } else if (game.phase === 'battle') {
    // バトルフェイズ：勇者の侵攻強化と生態系の連鎖
    updateHeroStrategy();
    updateEcosystem();
    updateHeroes(dt);

    // 勝敗判定
    if (game.heroes.length === 0) {
      game.phase = 'win';
      game.round++;
      game.message = `第${game.round}ラウンドへ突入！ 勇者の増援が近づく...`;
      spawnHeroesForStage(game.round); // ステージレベルに応じた勇者生成
    } else if (game.monsters.length === 0) {
      game.phase = 'over';
      game.message = '魔物が全滅した… 敗北。WASDで再挑戦';
    }
  }
}

function spawnHeroesForStage(round) {
  // ステージレベル(round)に応じて勇者の数と強さを調整
  const heroCount = Math.min(1 + Math.floor(round / 2), 5);
  for (let i = 0; i < heroCount; i++) {
    game.heroes.push({
      x: 0, y: 0, 
      hp: 10 * round, 
      level: round,
      aggression: 1.0
    });
  }
}
// ===END:UPDATE===

// ===SECTION:RENDER===
function render() {
  const W = COLS * TILE, H = ROWS * TILE;
  const skyHeight = TILE * 2;

  // 背景描画：上部水色の空と、深いダンジョンの地層
  const skyGrad = ctx.createLinearGradient(0, 0, 0, skyHeight);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#E0F7FA');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, skyHeight);
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, skyHeight, W, H - skyHeight);

  // 地形描画：壁と通路の質感を強化
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      const c = game.map[x] && game.map[x][y];
      if (!c) continue;
      const sx = x * TILE, sy = y * TILE;
      
      if (c.wall) {
        ctx.fillStyle = '#3d2b1f';
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.strokeStyle = '#251a12';
        ctx.strokeRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
        ctx.fillStyle = '#5c4432';
        ctx.fillRect(sx + 6, sy + 6, TILE - 12, TILE - 12);
      } else {
        ctx.fillStyle = '#151518';
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.strokeStyle = '#222';
        ctx.strokeRect(sx, sy, TILE, TILE);
      }
    }
  }

  // 採掘ハイライト：脈動するエフェクト
  if (game.phase === 'dig' && game.digsLeft > 0) {
    const p = game.player;
    const pulse = (Math.sin(Date.now() / 200) + 1) / 2;
    ctx.lineWidth = 3;
    [[0, -1], [0, 1], [-1, 0], [1, 0]].forEach(([dx, dy]) => {
      const tx = p.x + dx, ty = p.y + dy;
      if (isWall(tx, ty)) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 + pulse * 0.4})`;
        ctx.strokeRect(tx * TILE + 4, ty * TILE + 4, TILE - 8, TILE - 8);
        ctx.fillStyle = `rgba(255, 255, 255, ${0.2 + pulse * 0.3})`;
        ctx.fillRect(tx * TILE + 4, ty * TILE + 4, TILE - 8, TILE - 8);
      }
    });
  }

  // 魔物の描画
  game.monsters.forEach(m => {
    const cx = m.x * TILE + TILE / 2, cy = m.y * TILE + TILE / 2;
    const bounce = Math.sin(Date.now() / 150 + m.id) * 3;
    ctx.save();
    ctx.shadowBlur = 10;
    if (m.type === 1) { // 攻撃的：赤の鋭角
      ctx.fillStyle = '#ff3333';
      ctx.shadowColor = '#ff0000';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 10 + bounce); ctx.lineTo(cx + 8, cy + 8 + bounce); ctx.lineTo(cx - 8, cy + 8 + bounce);
      ctx.fill();
    } else { // 守備的/その他：青/緑の丸
      ctx.fillStyle = m.type === 2 ? '#33ff33' : '#33ccff';
      ctx.shadowColor = m.type === 2 ? '#00ff00' : '#00aaff';
      ctx.beginPath();
      ctx.arc(cx, cy + bounce, 7, 0, Math.PI * 2);
      ctx.fill();
    }
    if (m.justInteracted) {
      ctx.strokeStyle = 'white';
      ctx.strokeRect(cx - 12, cy - 12, 24, 24);
    }
    ctx.restore();
  });

  // 勇者の描画（HPバーとエフェクト付き）
  game.heroes.forEach(h => {
    const hx = h.x * TILE, hy = h.y * TILE;
    ctx.fillStyle = '#f1c40f'; // 勇者本体
    ctx.fillRect(hx + 5, hy + 5, TILE - 10, TILE - 10);
    
    // HPバー
    const hpRatio = h.hp / h.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(hx + 2, hy - 8, TILE - 4, 5);
    ctx.fillStyle = hpRatio > 0.5 ? '#2ecc71' : '#e74c3c';
    ctx.fillRect(hx + 2, hy - 8, (TILE - 4) * hpRatio, 5);

    // 被弾エフェクト
    if (h.isDamaged) {
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 4;
      ctx.strokeRect(hx, hy, TILE, TILE);
    }
  });

  // 魔王
  const px = game.player.x * TILE + TILE / 2, py = game.player.y * TILE + TILE / 2;
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px, py, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // UI
  ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
  ctx.fillRect(0, H, W, 60);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Arial';
  ctx.fillText(`STAGE: ${game.stageLevel}   ROUND: ${game.round}   DIGS: ${game.digsLeft}`, 20, H + 35);
}
// ===END:RENDER===

    // --- 起動コード（セクション外・防御的に呼び出す） ---
    window.addEventListener('resize', function () { if (typeof resize === 'function') resize(); });
    if (typeof resize === 'function') resize();
    if (typeof init === 'function') init();
    let __lastTs = 0;
    function __loop(ts) {
      const dt = Math.min(0.05, ((ts - __lastTs) || 16) / 1000);
      __lastTs = ts;
      if (typeof update === 'function') update(dt);
      if (typeof render === 'function') render();
      requestAnimationFrame(__loop);
    }
    requestAnimationFrame(__loop);
  </script>
</body>
</html>
