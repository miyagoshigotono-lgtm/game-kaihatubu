<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 15;
    const HUD = 120;
    let TILE = 40;
    let monsterCounter = 0;

    const FILTERS = { NONE: null, NURSERY: 'NURSERY', SANCTUARY: 'SANCTUARY', RESOURCE: 'RESOURCE' };

    let game = {
      round: 1,
      digsLeft: 10,
      interferencePoints: 5,
      phase: 'dig',
      map: [], 
      monsters: [],
      grid: [],
      heroes: [],
      particles: [],
      message: '魔王よ、地面を掘り、魔物の揺りかごを作れ (右クリックで環境フィルター設置)'
    };

    function getAttractiveness(x, y) {
      const f = game.map[x][y].filter;
      if (f === FILTERS.NURSERY) return 2.0;
      if (f === FILTERS.SANCTUARY) return 1.5;
      if (f === FILTERS.RESOURCE) return 1.8;
      return 1.0;
    }

    function addParticle(x, y, color, life = 1.0) {
      game.particles.push({
        x: x * TILE + TILE / 2,
        y: y * TILE + TILE / 2,
        vx: (Math.random() - 0.5) * 50,
        vy: (Math.random() - 0.5) * 50,
        life: life,
        color: color
      });
    }

    function mutate(val, nutrient) {
      const factor = Math.max(0.2, Math.min(1.0, nutrient / 5.0));
      return Math.max(0.1, val * (0.95 + Math.random() * 0.1 * factor));
    }

    function createMonster(x, y, type, parentGenes = null, generation = 1, parentId = 0, nutrient = 1.0) {
      const genes = parentGenes ? {
        speed: mutate(parentGenes.speed, nutrient),
        metabolism: mutate(parentGenes.metabolism, nutrient),
        reproThreshold: mutate(parentGenes.reproThreshold, nutrient),
        size: mutate(parentGenes.size || 1.0, nutrient)
      } : {
        speed: 0.5 + Math.random() * 0.5,
        metabolism: 0.8 + Math.random() * 0.4,
        reproThreshold: 80 + Math.random() * 40,
        size: 0.8 + Math.random() * 0.4
      };
      return { id: ++monsterCounter, parentId, generation, x, y, hp: 10, type, energy: 50, lastMoveTime: 0, genes };
    }

    function updateGrid() {
      game.grid = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => []));
      game.monsters.forEach(m => {
        if (m.x >= 0 && m.x < COLS && m.y >= 0 && m.y < ROWS) {
          game.grid[m.x][m.y].push(m);
        }
      });
    }

    function resize() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HUD;
      TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
      canvas.width = COLS * TILE;
      canvas.height = ROWS * TILE + HUD;
    }

    function init() {
      resize();
      game.map = Array.from({ length: COLS }, () => Array.from({ length: ROWS }, () => ({ value: 0.0, filter: null })));
      game.monsters = [];
      game.heroes = [];
      game.particles = [];
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round - 1) * 2;
      game.interferencePoints = 5 + game.round;
      game.message = 'ラウンド ' + game.round + '：ダンジョンを掘り進めよ';
      updateGrid();
    }

    function onDig(e) {
      if (game.phase === 'over') { game.round = 1; init(); return; }
      if (game.phase !== 'dig' || game.digsLeft <= 0) return;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy].value > 0) return;
      
      game.map[cx][cy].value = 3.0; 
      game.digsLeft--;
      
      if (Math.random() < 0.8) {
        game.monsters.push(createMonster(cx, cy, Math.random() > 0.4 ? 0 : 1));
        updateGrid();
      }

      if (game.digsLeft <= 0) {
        game.phase = 'battle';
        game.message = '勇者が侵攻を開始した！';
        for (let i = 0; i < 2 + game.round; i++) {
          game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 30 + game.round * 10, t: 0 });
        }
      }
    }

    function onFilter(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy].value === 0 || game.interferencePoints <= 0) return;

      const filters = [FILTERS.NONE, FILTERS.NURSERY, FILTERS.SANCTUARY, FILTERS.RESOURCE];
      let currentIdx = filters.indexOf(game.map[cx][cy].filter);
      game.map[cx][cy].filter = filters[(currentIdx + 1) % filters.length];
      game.interferencePoints--;
    }

    function update(dt) {
      game.particles.forEach((p, i) => {
        p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
        if(p.life <= 0) game.particles.splice(i, 1);
      });

      if (game.phase === 'battle') {
        const predators = game.monsters.filter(m => m.type === 1);
        const preys = game.monsters.filter(m => m.type === 0);
        const preyRatio = preys.length > 0 ? predators.length / preys.length : 5.0;
        const K = 2.0;

        for (let i = game.monsters.length - 1; i >= 0; i--) {
          let m = game.monsters[i];
          let metabolism = (Math.pow(m.genes.speed, 2) * m.genes.size * m.genes.metabolism);
          if (m.type === 1) metabolism *= (1.0 + preyRatio * K); 
          m.energy -= metabolism * dt * 5;
          m.lastMoveTime += dt;

          if (m.type === 1 && game.map[m.x][m.y].filter !== FILTERS.SANCTUARY) {
            let preyIdx = game.grid[m.x][m.y].findIndex(o => o.type === 0);
            if (preyIdx !== -1) {
              m.energy += game.grid[m.x][m.y][preyIdx].energy;
              game.grid[m.x][m.y][preyIdx].energy = -1; 
              for(let k=0; k<5; k++) addParticle(m.x, m.y, '#ff00ff');
            }
          }

          let attr = getAttractiveness(m.x, m.y);
          let moveThreshold = (1.5 - m.genes.speed) * (1.0 + attr * 0.5);

          if (m.lastMoveTime > moveThreshold) {
            let bestScore = -1, bestPos = {x: m.x, y: m.y};
            for(let dx=-1; dx<=1; dx++) {
              for(let dy=-1; dy<=1; dy++) {
                let nx = m.x + dx, ny = m.y + dy;
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[nx][ny].value > 0) {
                  let score = getAttractiveness(nx, ny) * (1.0 + (m.energy < 30 ? 1.0 : 0));
                  if(score > bestScore) { bestScore = score; bestPos = {x: nx, y: ny}; }
                }
              }
            }
            m.x = bestPos.x; m.y = bestPos.y;
            m.lastMoveTime = 0;
          }

          let reproChance = (game.map[m.x][m.y].filter === FILTERS.NURSERY) ? 0.05 : 0.005;
          if (m.energy > m.genes.reproThreshold && game.map[m.x][m.y].value > 0.2 && Math.random() < reproChance) {
            m.energy /= 2;
            game.monsters.push(createMonster(m.x, m.y, m.type, m.genes, m.generation + 1, m.id, game.map[m.x][m.y].value));
            for(let k=0; k<3; k++) addParticle(m.x, m.y, '#00ff00');
          }
          if (m.energy <= 0) { game.monsters.splice(i, 1); }
        }

        game.heroes.forEach((h, idx) => {
          h.t += dt;
          if (h.t > 1.0) {
            h.t = 0;
            let bestScore = -1, next = {x: h.x, y: h.y};
            for(let dx=-1; dx<=1; dx++) {
              for(let dy=-1; dy<=1; dy++) {
                let nx = h.x + dx, ny = h.y + dy;
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[nx][ny].value > 0) {
                  let score = game.map[nx][ny].value + (game.grid[nx][ny].length * 2);
                  if(score > bestScore) { bestScore = score; next = {x: nx, y: ny}; }
                }
              }
            }
            h.x = next.x; h.y = next.y;
            let target = game.grid[h.x][h.y] ? game.grid[h.x][h.y][0] : null;
            if (target) { 
              target.energy -= 20; 
              game.map[h.x][h.y].value = Math.max(0, game.map[h.x][h.y].value - 0.2); 
              for(let k=0; k<8; k++) addParticle(h.x, h.y, '#444444');
            }
          }
          if (h.hp <= 0) game.heroes.splice(idx, 1);
        });

        if (game.monsters.length === 0 && game.heroes.length > 0) { game.phase = 'over'; game.message = '魔物が全滅した... クリックで再挑戦'; }
        else if (game.heroes.length === 0) { game.round++; game.phase = 'dig'; game.digsLeft = 10 + (game.round - 1) * 2; game.message = '防衛成功！次の階層へ'; }
      }
      updateGrid();
    }

    function render() {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          let d = Math.min(1, game.map[x][y].value / 3);
          ctx.fillStyle = `rgb(${d*20}, ${d*150}, ${d*50})`;
          ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
          
          if(game.map[x][y].filter) {
            ctx.fillStyle = game.map[x][y].filter === FILTERS.NURSERY ? 'rgba(0,255,0,0.3)' : 
                            game.map[x][y].filter === FILTERS.SANCTUARY ? 'rgba(255,255,0,0.3)' : 'rgba(0,255,255,0.3)';
            ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          }
        }
      }
      
      game.monsters.forEach(m => {
        ctx.fillStyle = m.type === 1 ? '#ff4444' : '#44aaff';
        ctx.beginPath(); ctx.arc(m.x * TILE + TILE/2, m.y * TILE + TILE/2, TILE/4, 0, Math.PI*2); ctx.fill();
      });

      game.heroes.forEach(h => { ctx.fillStyle = '#fff'; ctx.fillRect(h.x * TILE + 5, h.y * TILE + 5, TILE - 10, TILE - 10); });
      game.particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); });
      ctx.globalAlpha = 1.0;
      
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText(`Round: ${game.round} | 掘削: ${game.digsLeft} | 干渉: ${game.interferencePoints} | 魔物: ${game.monsters.length} | 勇者: ${game.heroes.length}`, 20, ROWS * TILE + 30);
      ctx.fillText(game.message, 20, ROWS * TILE + 60);
    }

    let last = 0;
    function loop(ts) { update((ts - last) / 1000); render(); last = ts; requestAnimationFrame(loop); }
    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    canvas.addEventListener('contextmenu', onFilter);
    init(); requestAnimationFrame(loop);
  </script>
</body>
</html>
