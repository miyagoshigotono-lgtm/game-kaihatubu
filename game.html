<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 15;
    const HUD = 120;
    let TILE = 40;

    let game = {
      round: 1,
      digsLeft: 10,
      phase: 'dig',
      map: [],
      monsters: [],
      heroes: [],
      message: '魔王よ、地面を掘り、魔物の揺りかごを作れ'
    };

    function resize() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HUD;
      TILE = Math.floor(Math.min(availW / COLS, availH / ROWS));
      canvas.width = COLS * TILE;
      canvas.height = ROWS * TILE + HUD;
    }

    function init() {
      resize();
      game.map = Array.from({ length: COLS }, () => Array(ROWS).fill(0));
      game.monsters = [];
      game.heroes = [];
      game.phase = 'dig';
      game.digsLeft = 10 + (game.round - 1) * 2;
      game.message = 'ラウンド ' + game.round + '：ダンジョンを掘り進めよ';
    }

    function onDig(e) {
      if (game.phase === 'over') { game.round = 1; init(); return; }
      if (game.phase !== 'dig' || game.digsLeft <= 0) return;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor((e.clientX - rect.left) / TILE);
      const cy = Math.floor((e.clientY - rect.top) / TILE);
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || game.map[cx][cy] === 1) return;
      
      game.map[cx][cy] = 1;
      game.digsLeft--;
      
      if (Math.random() < 0.7) {
        // type: 0=草食(緑), 1=肉食(赤)
        game.monsters.push({ x: cx, y: cy, hp: 5, lv: 1, hunger: 50, type: Math.random() > 0.3 ? 0 : 1, age: 0 });
      }

      if (game.digsLeft <= 0) {
        game.phase = 'battle';
        game.message = '勇者が侵攻を開始した！';
        for (let i = 0; i < 2 + game.round; i++) {
          game.heroes.push({ x: 0, y: Math.floor(Math.random() * ROWS), hp: 10 + game.round * 5, t: 0 });
        }
      }
    }

    function update(dt) {
      if (game.phase !== 'battle') return;

      for (let i = game.monsters.length - 1; i >= 0; i--) {
        let m = game.monsters[i];
        m.age++;
        m.hunger -= 0.5;

        // 1. 移動
        if (Math.random() < 0.1) {
          const nx = m.x + (Math.random() > 0.5 ? 1 : -1);
          const ny = m.y + (Math.random() > 0.5 ? 1 : -1);
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && game.map[nx][ny] === 1) {
            m.x = nx; m.y = ny;
          }
        }

        // 2. 捕食 (肉食が草食を食べる)
        if (m.type === 1) {
          for (let target of game.monsters) {
            if (target.type === 0 && target.x === m.x && target.y === m.y) {
              m.hunger += 40;
              target.hp = 0;
            }
          }
        }

        // 3. 繁殖 (空腹度が高いと周囲に増える)
        if (m.hunger > 100) {
          m.hunger -= 60;
          game.monsters.push({ x: m.x, y: m.y, hp: 5, lv: 1, hunger: 50, type: m.type, age: 0 });
        }

        // 4. 進化
        if (m.hunger > 80 && m.lv === 1) { m.lv = 2; m.hp += 10; }

        // 5. 自然死
        if (m.hunger <= 0 || m.age > 500 || m.hp <= 0) {
          game.monsters.splice(i, 1);
        }
      }

      for (let h of game.heroes) {
        h.t += dt;
        if (h.t > 0.8) {
          h.t = 0;
          let target = game.monsters.reduce((prev, curr) => {
            const d1 = Math.abs(prev.x - h.x) + Math.abs(prev.y - h.y);
            const d2 = Math.abs(curr.x - h.x) + Math.abs(curr.y - h.y);
            return d2 < d1 ? curr : prev;
          }, game.monsters[0]);

          if (target) {
            if (target.x !== h.x) h.x += (target.x > h.x ? 1 : -1);
            else if (target.y !== h.y) h.y += (target.y > h.y ? 1 : -1);
            if (h.x === target.x && h.y === target.y) target.hp -= 3;
          }
        }
      }

      if (game.monsters.length === 0) {
        game.phase = 'over';
        game.message = '魔物が全滅した... 敗北。クリックで再挑戦';
      } else if (game.heroes.length === 0) {
        game.round++;
        game.phase = 'dig';
        game.digsLeft = 10 + (game.round - 1) * 2;
        game.message = '防衛成功。ラウンド ' + game.round + ' へ';
      }
    }

    function render() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillStyle = game.map[x][y] === 1 ? '#1a1a2e' : '#050505';
          ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        }
      }
      for (let m of game.monsters) {
        ctx.fillStyle = m.type === 0 ? '#44ff44' : '#ff4444';
        ctx.globalAlpha = m.lv === 2 ? 1.0 : 0.6;
        ctx.fillRect(m.x * TILE + 5, m.y * TILE + 5, TILE - 10, TILE - 10);
        ctx.globalAlpha = 1.0;
      }
      for (let h of game.heroes) {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(h.x * TILE + TILE/2, h.y * TILE + TILE/2, TILE/3, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#fff';
      ctx.font = '18px monospace';
      ctx.fillText(`Round: ${game.round} | 掘削: ${game.digsLeft} | 魔物: ${game.monsters.length} | 勇者: ${game.heroes.length}`, 20, ROWS * TILE + 40);
      ctx.fillText(game.message, 20, ROWS * TILE + 75);
    }

    let last = 0;
    function loop(ts) {
      update((ts - last) / 1000);
      render();
      last = ts;
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    canvas.addEventListener('click', onDig);
    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
