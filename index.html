<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー — 開発室</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f8f8f8;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      line-height: 1.6;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.02em; }
    .header .subtitle { font-size: 0.82rem; color: #888; }

    /* ===== メインレイアウト ===== */
    .main { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ===== ゲームプレビュー ===== */
    .game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }
    .game-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 10px;
    }
    .game-frame {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 20 / 14;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      background: #0a0a0a;
    }
    .game-frame iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* ===== ワークフロー操作 ===== */
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      padding: 8px 22px;
      font-size: 0.88rem;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn:hover { background: #f0f0f0; border-color: #aaa; }
    .btn:active { background: #e8e8e8; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status-msg {
      text-align: center;
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 1.4em;
      color: #555;
    }
    .status-msg.ok { color: #2a9d5c; }
    .status-msg.ng { color: #d94f4f; }
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 5px;
    }

    /* ===== セクション共通 ===== */
    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ececec;
    }

    /* ===== オーナーの意図 ===== */
    .intent-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
    }
    .intent-current {
      font-size: 0.92rem;
      color: #1a1a1a;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 12px;
      min-height: 2.5em;
    }
    .intent-current.empty { color: #bbb; font-style: italic; }
    .intent-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .intent-note { font-size: 0.76rem; color: #aaa; }
    .btn-edit {
      padding: 6px 16px;
      font-size: 0.82rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.12s;
    }
    .btn-edit:hover { background: #333; }

    /* ===== 開発ログ ===== */
    .log-list { display: flex; flex-direction: column; gap: 8px; }
    .log-entry {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }
    .log-entry summary {
      list-style: none;
      cursor: pointer;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      user-select: none;
    }
    .log-entry summary::-webkit-details-marker { display: none; }
    .log-entry summary:hover { background: #fafafa; }
    .log-entry[open] summary { border-bottom: 1px solid #f0f0f0; }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-morning { background: #fff3e0; color: #e07000; border: 1px solid #f0c070; }
    .badge-lunch   { background: #e8f5e9; color: #2a7d45; border: 1px solid #8bc99e; }
    .badge-ok  { background: #e8f5e9; color: #2a7d45; border: 1px solid #8bc99e; }
    .badge-ng  { background: #fdecea; color: #c0392b; border: 1px solid #e9a8a2; }

    .log-section-tag {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 4px;
      background: #f0f0f0;
      color: #555;
      font-weight: 600;
    }
    .log-task {
      flex: 1;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-ts { font-size: 0.75rem; color: #bbb; margin-left: auto; white-space: nowrap; }

    .log-body {
      padding: 12px 14px;
      font-size: 0.82rem;
      color: #555;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty-state { text-align: center; color: #bbb; font-size: 0.88rem; padding: 24px; }
  </style>
</head>
<body>
  <header class="header">
    <h1>破壊神のダンジョンメイカー</h1>
    <span class="subtitle" id="lastUpdated">読み込み中…</span>
  </header>

  <div class="main">

    <!-- ゲームプレビュー -->
    <div class="game-wrap">
      <div class="game-label">Game Preview</div>
      <div class="game-frame">
        <iframe id="gameFrame" src="game.html" title="破壊神のダンジョンメイカー"></iframe>
      </div>
      <div class="controls">
        <button class="btn" id="btnMorning" onclick="dispatchWorkflow('morning.yml')">朝礼を手動実行</button>
        <button class="btn" id="btnLunch" onclick="dispatchWorkflow('lunch.yml')">ランチを手動実行</button>
        <button class="btn" onclick="reloadGame()">ゲームをリロード</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
      <div class="hint">手動実行にはGitHub Personal Access Token（actions:write権限）が必要です。</div>
    </div>

    <!-- オーナーの意図 -->
    <div class="section">
      <div class="section-title">オーナーの開発意図</div>
      <div class="intent-box">
        <div class="intent-current" id="intentText">読み込み中…</div>
        <div class="intent-actions">
          <a class="btn-edit"
             href="https://github.com/miyagoshigotono-lgtm/game-kaihatubu/edit/main/user_intent.json"
             target="_blank" rel="noopener">
            GitHubで意図を編集する →
          </a>
          <span class="intent-note">変更は次のサイクルからAIに自動反映されます</span>
        </div>
      </div>
    </div>

    <!-- 開発ログ -->
    <div class="section">
      <div class="section-title">開発ログ <span id="logCount" style="font-weight:400;color:#bbb"></span></div>
      <div class="log-list" id="logList">
        <div class="empty-state">読み込み中…</div>
      </div>
    </div>

  </div>

  <script>
    const REPO_OWNER = 'miyagoshigotono-lgtm';
    const REPO_NAME  = 'game-kaihatubu';
    const REPO_REF   = 'main';

    // ===== ワークフロー手動実行 =====
    const statusEl = document.getElementById('statusMsg');
    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'status-msg' + (kind ? ' ' + kind : '');
    }
    function getOrAskToken() {
      let t = localStorage.getItem('gh_pat');
      if (!t) {
        t = prompt('GitHub Personal Access Token を入力してください（actions:write 権限が必要）');
        if (t) localStorage.setItem('gh_pat', t.trim());
      }
      return t ? t.trim() : '';
    }
    async function dispatchWorkflow(file) {
      const token = getOrAskToken();
      if (!token) { setStatus('トークンが未入力のため中止しました。', 'ng'); return; }
      document.getElementById('btnMorning').disabled = true;
      document.getElementById('btnLunch').disabled = true;
      setStatus('実行をリクエスト中…');
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${file}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ ref: REPO_REF })
          }
        );
        if (res.status === 204) {
          setStatus('実行を開始しました。数分後にこのページをリロードしてください。', 'ok');
        } else if (res.status === 401) {
          localStorage.removeItem('gh_pat');
          setStatus('認証失敗（401）。トークンを削除しました。再度クリックして入力し直してください。', 'ng');
        } else {
          let detail = '';
          try { detail = (await res.json()).message || ''; } catch (e) {}
          setStatus(`失敗（HTTP ${res.status}）${detail ? ': ' + detail : ''}`, 'ng');
        }
      } catch (e) {
        setStatus('ネットワークエラー: ' + e.message, 'ng');
      } finally {
        document.getElementById('btnMorning').disabled = false;
        document.getElementById('btnLunch').disabled = false;
      }
    }
    function reloadGame() {
      const f = document.getElementById('gameFrame');
      f.src = f.src;
    }

    // ===== データ取得 =====
    async function fetchJson(path) {
      const res = await fetch(path + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(`${path} の取得に失敗しました（${res.status}）`);
      return res.json();
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // UTC文字列 "YYYY-MM-DD HH:mm" → 日本時間表示
    function toJST(ts) {
      if (!ts) return '';
      const d = new Date(String(ts).replace(' ', 'T') + ':00Z');
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleString('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ===== 意図の表示 =====
    function renderIntent(data) {
      const el = document.getElementById('intentText');
      const text = (data && data.intent) ? String(data.intent).trim() : '';
      if (text) {
        el.textContent = text;
        el.classList.remove('empty');
      } else {
        el.textContent = 'まだ意図が設定されていません。右の「GitHubで意図を編集する」から設定してください。';
        el.classList.add('empty');
      }
    }

    // ===== ログの表示 =====
    function renderLogs(logs) {
      const el = document.getElementById('logList');
      const countEl = document.getElementById('logCount');
      if (!Array.isArray(logs) || logs.length === 0) {
        el.innerHTML = '<div class="empty-state">まだログがありません。</div>';
        countEl.textContent = '';
        return;
      }

      countEl.textContent = `（${logs.length}件）`;
      const sorted = logs.slice().reverse();

      el.innerHTML = sorted.map(l => {
        const isOk = l.result === 'success';
        const typeBadge = l.cycle_type === 'morning'
          ? '<span class="badge badge-morning">朝礼</span>'
          : '<span class="badge badge-lunch">ランチ</span>';
        const resultBadge = isOk
          ? '<span class="badge badge-ok">成功</span>'
          : '<span class="badge badge-ng">失敗</span>';
        const sectionTag = l.target_section
          ? `<span class="log-section-tag">${esc(l.target_section)}</span>`
          : '';
        const taskText = esc(l.task || l.priority || l.changes || '（詳細なし）');
        const ts = esc(toJST(l.timestamp));

        const bodyLines = [];
        if (l.task)    bodyLines.push(`タスク: ${l.task}`);
        if (l.changes && l.changes !== l.task) bodyLines.push(`実装内容: ${l.changes}`);
        if (l.qa_note) bodyLines.push(`QA: ${l.qa_note}`);
        if (l.retry_count > 0) bodyLines.push(`リトライ: ${l.retry_count}回`);
        const bodyHtml = bodyLines.map(line => esc(line)).join('\n');

        return `
<details class="log-entry">
  <summary>
    ${typeBadge}
    ${resultBadge}
    ${sectionTag}
    <span class="log-task">${taskText}</span>
    <span class="log-ts">${ts}</span>
  </summary>
  <div class="log-body">${bodyHtml}</div>
</details>`;
      }).join('');
    }

    // ===== 最終更新日時の表示 =====
    function renderLastUpdated(logs) {
      const el = document.getElementById('lastUpdated');
      if (!Array.isArray(logs) || logs.length === 0) { el.textContent = ''; return; }
      const last = logs[logs.length - 1];
      const successLogs = logs.filter(l => l.result === 'success');
      el.textContent = `最終更新: ${toJST(last.timestamp) || '—'} (JST) ／ 成功: ${successLogs.length}件 ／ 合計: ${logs.length}件`;
    }

    // ===== 初期ロード =====
    (async function init() {
      try {
        const intent = await fetchJson('user_intent.json');
        renderIntent(intent);
      } catch (e) {
        renderIntent(null);
      }
      try {
        const logs = await fetchJson('logs.json');
        renderLogs(logs);
        renderLastUpdated(logs);
      } catch (e) {
        document.getElementById('logList').innerHTML =
          `<div class="empty-state">${esc(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
