<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破壊神のダンジョンメイカー</title>
  <style>
    :root {
      --bg: #1a0a2e;
      --panel: #241038;
      --panel2: #2e1648;
      --line: #4a2b7a;
      --accent: #aa88ff;
      --text: #e9e0ff;
      --muted: #9a86c4;
      --ok: #36c46a;
      --ng: #e2566a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.6;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
    header h1 { margin: 0 0 4px; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; }
    header .updated { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; }

    .game-frame {
      width: 100%;
      aspect-ratio: 16 / 11;
      border: 2px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #10061e;
      box-shadow: 0 0 24px rgba(102, 51, 170, 0.4);
    }
    .game-frame iframe { width: 100%; height: 100%; border: 0; display: block; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 6px; }
    .controls button {
      flex: 1 1 160px;
      min-height: 44px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .controls button:hover { background: #3a1c5c; }
    .controls button:active { transform: translateY(1px); }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 0.8rem; margin: 2px 0 18px; }
    .status { min-height: 1.4em; font-size: 0.9rem; margin-bottom: 12px; }
    .status.ok { color: var(--ok); }
    .status.ng { color: var(--ng); }

    .scorebar { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 20px; }
    .soul {
      flex: 1 1 60px; text-align: center; background: var(--panel);
      border: 1px solid var(--line); border-radius: 6px; padding: 6px 2px;
    }
    .soul .n { font-size: 0.7rem; color: var(--muted); }
    .soul .v { font-size: 1.1rem; color: var(--accent); }

    h2 { font-size: 1.05rem; color: var(--accent); border-bottom: 1px solid var(--line); padding-bottom: 6px; }

    .log {
      border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px;
      background: var(--panel); overflow: hidden;
    }
    .log summary {
      list-style: none; cursor: pointer; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px; font-size: 0.9rem;
    }
    .log summary::-webkit-details-marker { display: none; }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; font-weight: bold; white-space: nowrap;
    }
    .badge.ok { background: rgba(54, 196, 106, 0.18); color: var(--ok); border: 1px solid var(--ok); }
    .badge.ng { background: rgba(226, 86, 106, 0.18); color: var(--ng); border: 1px solid var(--ng); }
    .log .body { padding: 0 12px 12px; font-size: 0.85rem; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .log .ts { color: var(--muted); margin-left: auto; font-size: 0.78rem; }
    .empty { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>破壊神のダンジョンメイカー</h1>
      <div class="updated" id="updated">最終更新: 読み込み中…</div>
    </header>

    <div class="game-frame">
      <iframe id="gameFrame" src="game.html" title="game"></iframe>
    </div>

    <div class="controls">
      <button id="btnMorning" onclick="dispatchWorkflow('morning.yml')">☀️ 朝礼を実行</button>
      <button id="btnLunch" onclick="dispatchWorkflow('lunch.yml')">🍱 ランチを実行</button>
    </div>
    <div class="hint">※ 初回クリック時に GitHub Personal Access Token（actions:write 権限）を入力します。トークンはこのブラウザの localStorage に保存されます。</div>
    <div class="status" id="status"></div>

    <h2>📊 最新の評価スコア（7つの魂）</h2>
    <div class="scorebar" id="scorebar"><span class="empty">読み込み中…</span></div>

    <h2>📋 開発ログ</h2>
    <div id="logs"><span class="empty">読み込み中…</span></div>
  </div>

  <script>
    // ====== 書き換え箇所（あなたのリポジトリに合わせて変更） ======
    const REPO_OWNER = 'miyagoshigotono-lgtm';  // ← あなたのGitHubユーザー名
    const REPO_NAME  = 'game-kaihatubu';          // ← リポジトリ名
    const REPO_REF   = 'main';                    // ← デフォルトブランチ
    // ============================================================

    const statusEl = document.getElementById('status');

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    function getOrAskToken() {
      let t = localStorage.getItem('gh_pat');
      if (!t) {
        t = prompt('GitHub Personal Access Token を入力してください（actions:write 権限が必要）');
        if (t) localStorage.setItem('gh_pat', t.trim());
      }
      return t ? t.trim() : '';
    }

    async function dispatchWorkflow(workflowFile) {
      const token = getOrAskToken();
      if (!token) { setStatus('トークンが未入力のため中止しました。', 'ng'); return; }
      const btnM = document.getElementById('btnMorning');
      const btnL = document.getElementById('btnLunch');
      btnM.disabled = btnL.disabled = true;
      setStatus('実行をリクエストしています…');
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${workflowFile}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ ref: REPO_REF })
          }
        );
        if (res.status === 204) {
          setStatus('実行を開始しました。数分後にこのページをリロードしてください。', 'ok');
        } else if (res.status === 401) {
          localStorage.removeItem('gh_pat');
          setStatus('認証に失敗しました（401）。トークンを削除しました。再度クリックして入力し直してください。', 'ng');
        } else {
          let detail = '';
          try { detail = (await res.json()).message || ''; } catch (e) {}
          setStatus(`失敗しました（HTTP ${res.status}）。${detail}`, 'ng');
        }
      } catch (e) {
        setStatus('ネットワークエラー: ' + e.message, 'ng');
      } finally {
        btnM.disabled = btnL.disabled = false;
      }
    }

    async function fetchJson(path) {
      const res = await fetch(path + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(path + ' の取得に失敗 (' + res.status + ')');
      return res.json();
    }

    function renderScores(directive) {
      const el = document.getElementById('scorebar');
      const labels = ['掘削', '回数制限', '魔物生成', '生態系', '勇者侵攻', '間接干渉', '勝敗'];
      const scores = (directive && directive.evaluation && directive.evaluation.soul_scores) || [];
      if (!scores.length) { el.innerHTML = '<span class="empty">まだ評価がありません。朝礼を実行してください。</span>'; return; }
      el.innerHTML = scores.map((s, i) =>
        `<div class="soul"><div class="n">魂${i + 1}<br>${labels[i] || ''}</div><div class="v">${s}</div></div>`
      ).join('');
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    function renderLogs(logs) {
      const el = document.getElementById('logs');
      if (!Array.isArray(logs) || !logs.length) { el.innerHTML = '<span class="empty">まだログがありません。</span>'; return; }
      const sorted = logs.slice().reverse(); // 最新が上
      el.innerHTML = sorted.map(l => {
        const ok = l.result === 'success';
        const badge = ok ? '<span class="badge ok">成功</span>' : '<span class="badge ng">失敗</span>';
        const title = `サイクル#${esc(l.cycle_number)} ${esc(l.cycle_type)}`;
        const body = `優先: ${esc(l.priority)}\n実装内容: ${esc(l.changes)}\nQA: ${esc(l.qa_note)}`;
        return `<details class="log"><summary>${badge}<span>${title}</span><span class="ts">${esc(l.timestamp)}</span></summary><div class="body">${body}</div></details>`;
      }).join('');
    }

    (async function load() {
      try {
        const directive = await fetchJson('morning_directive.json');
        renderScores(directive);
        document.getElementById('updated').textContent =
          '最終更新: ' + (directive.date || '—') + '（サイクル #' + (directive.cycle ?? 0) + '）';
      } catch (e) {
        document.getElementById('scorebar').innerHTML = '<span class="empty">' + esc(e.message) + '</span>';
      }
      try {
        renderLogs(await fetchJson('logs.json'));
      } catch (e) {
        document.getElementById('logs').innerHTML = '<span class="empty">' + esc(e.message) + '</span>';
      }
    })();
  </script>
</body>
</html>
