name: Lunch Meeting (ランチ)

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-maker-pipeline
  cancel-in-progress: false

jobs:
  lunch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run lunch agent (実装・QA・全文上書き)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/lunch.js

      - name: Commit game.html & logs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add game.html logs.json
          if git diff --staged --quiet; then
            echo "変更なし（QA不合格でgame.html非変更、またはログ差分なし）。"
          else
            git commit -m "ランチ: game.html を更新 [skip ci]"
            git push
          fi
