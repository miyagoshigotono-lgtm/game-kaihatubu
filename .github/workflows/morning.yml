name: Morning Meeting (朝礼)

on:
  # バージョン0の基盤を保護するため定期実行を一時停止中。
  # 安全な夜バッチ（実行ゲート付き）へ移行したら schedule を復活させる。
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dungeon-maker-pipeline
  cancel-in-progress: false

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run morning agent (セクション選定→実装→QA)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/morning.js

      - name: Commit game.html & logs.json & feature_registry.json & transcript.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add game.html logs.json feature_registry.json transcript.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "朝礼: game.html / 台本 を更新 [skip ci]"
            git push
          fi
