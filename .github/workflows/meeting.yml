name: Night Meetings (夜会議)

on:
  # 夜のうちにまとめて開発する（JST 深夜帯）。UTCで指定。
  #  JST 01:30 → UTC 16:30 / JST 02:30 → UTC 17:30 / JST 03:30 → UTC 18:30
  schedule:
    - cron: '30 16 * * *'
    - cron: '30 17 * * *'
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      rounds:
        description: '1回の起動で行うミーティング回数'
        required: false
        default: '1'

permissions:
  contents: write

concurrency:
  group: dungeon-maker-pipeline
  cancel-in-progress: false

jobs:
  meeting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium (成長アルバム用スクショ)
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.56.1 >/dev/null 2>&1 || npm install playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1 || npx playwright install chromium >/dev/null 2>&1
          echo "playwright 準備完了"

      - name: Run meetings (選定→生成→実行/行動ゲート→QA→台本→スクショ)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROUNDS: ${{ github.event.inputs.rounds || '1' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "今回のミーティング回数: $ROUNDS"
          for i in $(seq 1 "$ROUNDS"); do
            echo "==================== 会議 $i / $ROUNDS ===================="
            node scripts/meeting.js || echo "会議 $i が異常終了（巻き戻し済みのはず。続行）"
            # ゲームに変化があった時だけ成長アルバム用のスクショを撮る
            if ! git diff --quiet game.html; then
              node scripts/screenshot.js || echo "スクショ失敗（続行）"
            fi
            git add game.html game.last-good.html logs.json feature_registry.json roadmap.json transcript.json screenshots
            if git diff --staged --quiet; then
              echo "変更なし（実行ゲート不合格など）。コミットをスキップ。"
            else
              git commit -m "夜会議 #$i: game.html / 台本 / アルバム を更新 [skip ci]"
              # ネットワーク失敗時は指数バックオフで最大4回プッシュを試す
              n=0; until [ $n -ge 4 ]; do
                git push && break
                n=$((n+1)); echo "push失敗。$((2**n))秒後に再試行"; sleep $((2**n))
              done
            fi
            # 次の会議まで間隔をあけてAPI混雑を回避（最後の回は待たない）
            if [ "$i" -lt "$ROUNDS" ]; then echo "次の会議まで120秒待機…"; sleep 120; fi
          done
